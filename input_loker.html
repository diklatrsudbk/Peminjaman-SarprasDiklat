<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pinjam Kunci Loker</title>
    <!-- Pastikan Library Supabase Terload -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4" x-data="lokerForm()">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold uppercase tracking-widest">Peminjaman Kunci Loker</h1>
        </div>

        <!-- Tambahkan x-cloak agar tidak berkedip saat loading -->
        <form @submit.prevent="submit" class="p-6 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Nama Peminjam</label>
                    <input type="text" x-model="f.nama_peminjam" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">NIM / ID</label>
                    <input type="text" x-model="f.nim" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Nama Institusi</label>
                    <input type="text" x-model="f.nama_institusi" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Jurusan</label>
                    <input type="text" x-model="f.jurusan" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div>
        <label class="text-[10px] font-bold text-slate-400 uppercase">No. Telp (WA)</label>
        <input type="text" x-model="f.no_telp" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none font-mono">
    </div>
    <div>
        <label class="text-[10px] font-bold text-slate-400 uppercase">Kunci Loker</label>
        <select x-model="f.jenis_kunci" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none bg-white">
            <option value="">Pilih Jenis</option>
            <option value="Perempuan">Perempuan</option>
            <option value="Laki-laki">Laki-laki</option>
        </select>
    </div>
    <div>
        <label class="text-[10px] font-bold text-slate-400 uppercase">Jumlah Kunci</label>
        <input type="number" x-model.number="f.jumlah" min="1" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none font-bold text-indigo-600">
    </div>
</div>


            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 italic text-slate-500 text-xs">
                <div>
                    <label class="block mb-1 font-bold uppercase text-[10px]">Tanggal Mulai</label>
                    <input type="date" x-model="f.tanggal_mulai" required class="w-full border border-slate-200 p-2 rounded-lg outline-none focus:ring-2 ring-indigo-100">
                </div>
                <div>
                    <label class="block mb-1 font-bold uppercase text-[10px]">Tanggal Selesai</label>
                    <input type="date" x-model="f.tanggal_selesai" required class="w-full border border-slate-200 p-2 rounded-lg outline-none focus:ring-2 ring-indigo-100">
                </div>
            </div>

            <!-- Tombol dengan loading state -->
            <button type="submit" :disabled="loading" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all disabled:bg-slate-300">
                <span x-show="!loading">SIMPAN PEMINJAMAN</span>
                <span x-show="loading">MENGIRIM DATA...</span>
            </button>
        </form>
    </div>

    <script>
        // GANTI DENGAN KREDENSIAL ANDA
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerForm() {
            return {
                loading: false,
                f: { 
    nama_peminjam: '', 
    nim: '', 
    nama_institusi: '', 
    jurusan: '', 
    no_telp: '', 
    jenis_kunci: '', 
    jumlah: 1, // Kolom jumlah yang tadi
    no_kunci: '', // Kosong saat request
    tanggal_mulai: '', 
    tanggal_selesai: '', 
    status: 'Request' // Status awal
},
                async submit() {
                    this.loading = true;
                    try {
                        const { data, error } = await _sb
                            .from('peminjaman_loker') // Pastikan nama tabel di Supabase SAMA PERSIS
                            .insert([this.f]);

                        if (error) throw error;

                        alert('Data Berhasil Disimpan!');
                        window.location.href = 'daftar_loker.html';
                    } catch (err) {
                        console.error(err);
                        alert('Gagal: ' + err.message);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
