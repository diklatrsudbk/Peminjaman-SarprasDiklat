<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pinjam Kunci Loker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-4" x-data="lokerForm()">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold uppercase tracking-widest">Peminjaman Kunci Loker</h1>
            <p class="text-[10px] opacity-70 font-bold mt-1 uppercase">Ruang Diklat Lantai 6</p>
        </div>

        <form @submit.prevent="submit" class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Nama Peminjam</label>
                    <input type="text" x-model="f.nama_peminjam" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">NIM / ID</label>
                    <input type="text" x-model="f.nim" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Nama Institusi</label>
                    <input type="text" x-model="f.nama_institusi" required class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">No. Telp (WhatsApp)</label>
                    <input type="text" x-model="f.no_telp" required placeholder="0812..." class="w-full border-b-2 border-slate-100 p-2 focus:border-indigo-500 outline-none font-mono">
                </div>
            </div>

            <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 space-y-4">
                <label class="text-[10px] font-black text-slate-500 uppercase block mb-2 tracking-widest text-center">Jumlah Kunci Yang Dipinjam</label>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="flex items-center gap-2 text-[10px] font-black text-blue-600 uppercase">
                            <i class="fa fa-mars text-sm"></i> Laki-laki
                        </label>
                        <input type="number" x-model.number="f.qty_l" min="0" class="w-full p-3 rounded-xl border-2 border-white focus:border-blue-400 outline-none font-bold text-lg shadow-sm">
                        <p class="text-[9px] text-slate-400 italic">*Isi 0 jika tidak pinjam</p>
                    </div>

                    <div class="space-y-2">
                        <label class="flex items-center gap-2 text-[10px] font-black text-pink-600 uppercase">
                            <i class="fa fa-venus text-sm"></i> Perempuan
                        </label>
                        <input type="number" x-model.number="f.qty_p" min="0" class="w-full p-3 rounded-xl border-2 border-white focus:border-pink-400 outline-none font-bold text-lg shadow-sm">
                        <p class="text-[9px] text-slate-400 italic">*Isi 0 jika tidak pinjam</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 font-bold uppercase text-[10px] text-slate-400">Tanggal Mulai</label>
                    <input type="date" x-model="f.tanggal_mulai" required class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 ring-indigo-100 text-sm font-bold">
                </div>
                <div>
                    <label class="block mb-1 font-bold uppercase text-[10px] text-slate-400">Tanggal Selesai</label>
                    <input type="date" x-model="f.tanggal_selesai" required class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 ring-indigo-100 text-sm font-bold">
                </div>
            </div>

            <button type="submit" :disabled="loading" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all disabled:bg-slate-300 uppercase tracking-widest text-sm">
                <span x-show="!loading">AJUKAN PEMINJAMAN</span>
                <span x-show="loading">MENGIRIM DATA...</span>
            </button>
        </form>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerForm() {
            return {
                loading: false,
                f: { 
                    nama_peminjam: '', 
                    nim: '', 
                    nama_institusi: '', 
                    jurusan: '-', 
                    no_telp: '', 
                    qty_l: 0, // Input temporary
                    qty_p: 0, // Input temporary
                    jenis_kunci: '', // Untuk DB
                    jumlah: 0, // Untuk DB
                    no_kunci: '', 
                    tanggal_mulai: new Date().toISOString().split('T')[0], 
                    tanggal_selesai: '', 
                    status: 'Request'
                },

                async submit() {
                    // Validasi: Harus ada kunci yang dipinjam
                    const total = this.f.qty_l + this.f.qty_p;
                    if(total === 0) return alert('Pilih minimal 1 kunci (Laki-laki atau Perempuan)!');

                    this.loading = true;

                    // GABUNGKAN DATA KE FORMAT DATABASE
                    let jenis = [];
                    if(this.f.qty_l > 0) jenis.push(`Laki-laki (${this.f.qty_l})`);
                    if(this.f.qty_p > 0) jenis.push(`Perempuan (${this.f.qty_p})`);
                    
                    // Siapkan payload final untuk dikirim
                    const payload = {
                        nama_peminjam: this.f.nama_peminjam,
                        nim: this.f.nim,
                        nama_institusi: this.f.nama_institusi,
                        jurusan: this.f.jurusan,
                        no_telp: this.f.no_telp,
                        jenis_kunci: jenis.join(' & '), // Simpan: "Laki-laki (1) & Perempuan (2)"
                        jumlah: total, // Simpan angka total (3)
                        tanggal_mulai: this.f.tanggal_mulai,
                        tanggal_selesai: this.f.tanggal_selesai,
                        status: 'Request',
                        no_kunci: ''
                    };

                    try {
                        const { error } = await _sb
                            .from('peminjaman_loker')
                            .insert([payload]);

                        if (error) throw error;

                        alert('Request Berhasil Dikirim! Silakan ke Lantai 6 Ruang Diklat.');
                        window.location.href = 'daftar_loker.html';
                    } catch (err) {
                        alert('Gagal: ' + err.message);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
