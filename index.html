<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Portal Sarpras Digital</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>

    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter', sans-serif;
      background:
      linear-gradient(to bottom right,#eff6ff,#f8fafc);

      color:var(--text);

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;
    }

    .portal-container{
      width:100%;
      max-width:1000px;
    }

    .header{
      text-align:center;
      margin-bottom:50px;
    }

    .logo{
      width:90px;
      height:90px;

      background:var(--primary);

      margin:auto;
      margin-bottom:20px;

      border-radius:25px;

      display:flex;
      align-items:center;
      justify-content:center;

      color:white;
      font-size:40px;

      box-shadow:
      0 20px 40px rgba(37,99,235,0.3);
    }

    .header h1{
      font-size:2.5rem;
      font-weight:700;
      margin-bottom:10px;
      color:#0f172a;
    }

    .header p{
      color:#64748b;
      font-size:1.05rem;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(220px,1fr));

      gap:24px;
    }

    .menu-card{
      background:rgba(255,255,255,0.8);

      backdrop-filter: blur(10px);

      border:1px solid #e2e8f0;

      border-radius:24px;

      padding:35px 20px;

      text-decoration:none;

      color:var(--text);

      display:flex;
      flex-direction:column;

      align-items:center;

      gap:18px;

      transition:0.3s;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.05);
    }

    .menu-card i{
      width:85px;
      height:85px;

      border-radius:50%;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:34px;

      color:var(--primary);

      background:#dbeafe;

      transition:0.3s;
    }

    .menu-card h3{
      font-size:1.1rem;
      font-weight:600;
      text-align:center;
    }

    .menu-card:hover{
      transform:translateY(-10px);

      border-color:var(--primary);

      box-shadow:
      0 25px 50px rgba(37,99,235,0.15);
    }

    .menu-card:hover i{
      background:var(--primary);
      color:white;

      transform:scale(1.1);
    }

    .footer{
      text-align:center;
      margin-top:50px;

      color:#94a3b8;
      font-size:14px;
    }

    @media(max-width:480px){

      .header h1{
        font-size:1.8rem;
      }

      .menu-grid{
        grid-template-columns:1fr 1fr;
      }

      .menu-card{
        padding:20px 10px;
      }

      .menu-card i{
        width:65px;
        height:65px;
        font-size:25px;
      }

    }

  </style>

</head>

<body>

  <div class="portal-container">

    <!-- HEADER -->
    <div class="header">

      <div class="logo">
        <i class="fa-solid fa-building"></i>
      </div>

      <h1>Sistem Layanan Sarpras</h1>

      <p>
        Portal Digital Peminjaman Sarana & Prasarana Diklat
      </p>

    </div>

    <!-- MENU -->
    <div class="menu-grid">

      <a href="daftar_ruangan.html"
         class="menu-card">

        <i class="fa-solid fa-door-open"></i>

        <h3>Peminjaman Ruangan</h3>

      </a>

      <a href="PeminjamanKunci.html"
         class="menu-card">

        <i class="fa-solid fa-key"></i>

        <h3>Kunci Loker</h3>

      </a>

      <a href="PeminjamanBarang.html"
         class="menu-card">

        <i class="fa-solid fa-laptop-code"></i>

        <h3>Barang / Aset</h3>

      </a>

      <a href="DataSarpras.html"
         class="menu-card">

        <i class="fa-solid fa-chart-pie"></i>

        <h3>Data Sarpras</h3>

      </a>

    </div>

    <!-- FOOTER -->
    <div class="footer">

      © 2026 Sarpras Diklat

    </div>

  </div>

</body>
</html>
