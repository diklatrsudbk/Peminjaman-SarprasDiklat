<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Loker - RSUD Bandung Kiwari</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> [x-cloak] { display: none !important; } </style>
</head>
<body class="bg-slate-50 p-4" x-data="lokerList()">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 font-serif">Management Loker Lt. 6</h1>
                <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">RSUD Bandung Kiwari</p>
            </div>
            <div class="flex items-center gap-2">
                <input type="text" x-model="search" placeholder="Cari Nama/NIM..." class="px-4 py-2 rounded-xl border border-slate-200 outline-none shadow-sm focus:ring-2 ring-indigo-100">
                <button @click="fetchData" class="bg-indigo-600 text-white p-2.5 rounded-xl"><i class="fa fa-sync"></i></button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b text-[10px] uppercase text-slate-400">
                    <tr>
                        <th class="p-4">Peminjam</th>
                        <th class="p-4 text-center">Qty</th>
                        <th class="p-4">Nomor Kunci</th>
                        <th class="p-4 text-center">Status</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <template x-for="item in filteredLokers" :key="item.id">
                        <tr class="border-b hover:bg-slate-50 transition-colors">
                            <td class="p-4">
                                <div class="font-bold text-slate-700" x-text="item.nama_peminjam"></div>
                                <div class="text-[10px] text-indigo-500 font-bold uppercase" x-text="item.nama_institusi"></div>
                            </td>
                            <td class="p-4 text-center font-bold" x-text="item.jumlah"></td>
                            <td class="p-4 font-mono text-xs">
                                <span x-text="item.no_kunci || '-'" class="bg-slate-100 px-2 py-1 rounded border"></span>
                            </td>
                            <td class="p-4 text-center">
                                <span :class="statusColor(item.status)" class="px-3 py-1 rounded-full text-[9px] font-black uppercase" x-text="item.status"></span>
                            </td>
                            <td class="p-4 text-center space-x-1">
                                <template x-if="['Request', 'Booking'].includes(item.status)">
                                    <button @click="openActionModal(item)" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase shadow-sm">Confirm</button>
                                </template>
                                
                                <template x-if="item.status === 'Sedang Dipinjam'">
                                    <button @click="updateStatus(item.id, 'Selesai')" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase">Selesai</button>
                                </template>

                                <template x-if="['Request', 'Booking', 'Sedang Dipinjam'].includes(item.status)">
                                    <button @click="updateStatus(item.id, 'Cancel')" class="bg-rose-100 text-rose-600 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase">Reject</button>
                                </template>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
            <div @click.away="showModal = false" class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
                <div class="p-6">
                    <h3 class="font-bold text-slate-800 text-lg mb-1" x-text="selectedItem?.nama_peminjam"></h3>
                    <p class="text-[10px] text-slate-400 mb-4 uppercase">Status: <span x-text="selectedItem?.status"></span></p>

                    <div class="space-y-4">
                        <button @click="panggilWA()" class="w-full flex items-center justify-between bg-green-500 text-white p-4 rounded-2xl">
                            <div class="text-left"><p class="font-bold text-sm">Booking via WA</p><p class="text-[9px] opacity-75 uppercase">Ubah Status Ke Booking</p></div>
                            <i class="fab fa-whatsapp text-2xl"></i>
                        </button>

                        <div class="border-t border-slate-100 pt-4">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 text-center">Plot Nomor Kunci (<span x-text="selectedItem?.jumlah"></span> Kunci)</p>
                            
                            <div class="space-y-2">
                                <template x-for="(n, index) in tempKeys" :key="index">
                                    <div class="flex items-center gap-2">
                                        <div class="bg-slate-100 text-[10px] font-bold px-2 py-3 rounded-lg border w-12 text-center" x-text="'#' + (index+1)"></div>
                                        <select x-model="tempKeys[index]" class="w-full border p-2.5 rounded-lg text-sm outline-none focus:border-indigo-500">
                                            <option value="">Pilih Nomor Kunci...</option>
                                            <template x-for="num in getAvailableNumbers()" :key="num">
                                                <option :value="num" x-text="num"></option>
                                            </template>
                                        </select>
                                    </div>
                                </template>
                            </div>

                            <button @click="simpanPlotKunci()" class="w-full mt-4 bg-indigo-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-indigo-100">SIMPAN & PINJAMKAN</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerList() {
            return {
                lokers: [],
                search: '',
                showModal: false,
                selectedItem: null,
                tempKeys: [], // Menyimpan pilihan kunci sementara
                adminPass: "diklat6",

                async init() { this.fetchData(); },

                async fetchData() {
                    const { data } = await _sb.from('peminjaman_loker').select('*').order('created_at', { ascending: false });
                    if (data) this.lokers = data;
                },

                get filteredLokers() {
                    return this.lokers.filter(i => 
                        i.nama_peminjam.toLowerCase().includes(this.search.toLowerCase()) || 
                        i.nim.toLowerCase().includes(this.search.toLowerCase())
                    );
                },

                statusColor(s) {
                    return {
                        'Request': 'bg-amber-100 text-amber-600',
                        'Booking': 'bg-purple-100 text-purple-600',
                        'Sedang Dipinjam': 'bg-blue-600 text-white shadow-sm',
                        'Selesai': 'bg-green-100 text-green-600',
                        'Cancel': 'bg-rose-100 text-rose-600'
                    }[s];
                },

                openActionModal(item) {
                    const pass = prompt("Hanya Admin: Masukkan Password");
                    if (pass !== this.adminPass) return alert("Password Salah!");
                    this.selectedItem = item;
                    // Reset array tempKeys sesuai jumlah yang dipinjam
                    this.tempKeys = Array(item.jumlah).fill('');
                    this.showModal = true;
                },

                getAvailableNumbers() {
                    const prefix = this.selectedItem?.jenis_kunci === 'Laki-laki' ? 'L' : 'P';
                    const max = prefix === 'L' ? 100 : 150;
                    
                    // Ambil daftar nomor yang sedang dipakai/booking di database
                    const usedNumbers = this.lokers
                        .filter(i => ['Booking', 'Sedang Dipinjam'].includes(i.status) && i.no_kunci)
                        .flatMap(i => i.no_kunci.split(',').map(n => n.trim()));

                    let available = [];
                    for(let i=1; i<=max; i++) {
                        let num = prefix + i;
                        if (!usedNumbers.includes(num)) available.push(num);
                    }
                    return available;
                },

                async panggilWA() {
                    let phone = this.selectedItem.no_telp.replace(/\D/g, '');
                    phone = phone.startsWith('0') ? '62' + phone.slice(1) : phone;
                    const pesan = `Halo kak ${this.selectedItem.nama_peminjam}, Permohonan kunci loker Anda sudah kami setujui. Balas "YES" untuk booking.`;
                    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(pesan)}`, '_blank');
                    await this.updateStatus(this.selectedItem.id, 'Booking');
                    this.showModal = false;
                },

                async simpanPlotKunci() {
                    // Validasi: Semua dropdown harus diisi dan tidak boleh ada nomor duplikat di pilihan admin
                    if (this.tempKeys.some(k => k === '')) return alert("Semua nomor kunci harus dipilih!");
                    if (new Set(this.tempKeys).size !== this.tempKeys.length) return alert("Nomor kunci tidak boleh ada yang sama!");

                    const keyString = this.tempKeys.join(', ');
                    await this.updateStatus(this.selectedItem.id, 'Sedang Dipinjam', keyString);
                    this.showModal = false;
                },

                async updateStatus(id, status, noKunci = null) {
                    let payload = { status: status };
                    if (noKunci) payload.no_kunci = noKunci;
                    
                    const { error } = await _sb.from('peminjaman_loker').update(payload).eq('id', id);
                    if (!error) {
                        alert(`Status Berhasil diubah ke ${status}`);
                        this.fetchData();
                    }
                }
            }
        }
    </script>
</body>
</html>
