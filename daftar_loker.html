<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Loker - Lantai 6</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-6" x-data="lokerManager()" x-init="fetchData()">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-3 rounded-xl text-white shadow-lg">
                    <i class="fa fa-key text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-black text-slate-800 tracking-tight">Admin Loker - Lantai 6</h2>
                    <div class="relative mt-1">
                        <input type="text" x-model="searchQuery" placeholder="Cari Nama / No. Kunci..." class="pl-8 pr-4 py-1 text-xs border rounded-full outline-none focus:border-indigo-500 w-64">
                        <i class="fa fa-search absolute left-3 top-2 text-slate-300 text-[10px]"></i>
                    </div>
                </div>
            </div>
            <a href="input_loker.html" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all text-sm">
                + Request Baru
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden custom-scroll overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[1100px]">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-[10px] font-bold uppercase">
                    <tr>
                        <th class="p-4 text-center w-12">No</th>
                        <th class="p-4">Peminjam</th>
                        <th class="p-4">Kunci & Qty</th>
                        <th class="p-4">No. Kunci Fisik</th>
                        <th class="p-4">Status</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <template x-for="(item, i) in filteredList" :key="item.id">
                        <tr class="border-b last:border-0 hover:bg-slate-50 transition-colors">
                            <td class="p-4 text-center font-mono text-slate-300" x-text="i+1"></td>
                            <td class="p-4">
                                <div class="font-bold text-slate-800" x-text="item.nama_peminjam"></div>
                                <div class="text-[10px] text-slate-400 font-medium" x-text="item.nim"></div>
                            </td>
                            <td class="p-4">
                                <span :class="item.jenis_kunci === 'Perempuan' ? 'text-pink-600 bg-pink-50' : 'text-blue-600 bg-blue-50'" 
                                      class="px-2 py-1 rounded-md text-[10px] font-black border border-current uppercase">
                                    <span x-text="item.jenis_kunci"></span> | QTY: <span x-text="item.jumlah"></span>
                                </span>
                            </td>
                            <td class="p-4">
                                <template x-if="item.no_kunci">
                                    <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg font-bold text-xs" x-text="item.no_kunci"></span>
                                </template>
                                <template x-if="!item.no_kunci">
                                    <span class="text-slate-300 italic text-xs tracking-tighter">Menunggu Plotting...</span>
                                </template>
                            </td>
                            <td class="p-4">
                                <span :class="colors[item.status]" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase" x-text="item.status"></span>
                            </td>
                            <td class="p-4 text-center">
                                <div class="flex justify-center gap-2">
                                    <template x-if="item.status === 'Request'">
                                        <button @click="openAcc(item)" class="h-8 px-3 bg-indigo-600 text-white rounded-lg text-[10px] font-bold">PLOT KUNCI</button>
                                    </template>
                                    <template x-if="item.status === 'Sedang Di Pinjam'">
                                        <button @click="openModal('upload', item.id)" class="h-8 px-3 bg-slate-800 text-white rounded-lg text-[10px] font-bold">KEMBALI</button>
                                    </template>
                                    <button @click="openModal('delete', item.id)" class="text-rose-300 hover:text-rose-600 ml-2"><i class="fa fa-trash-alt"></i></button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="modal" x-cloak class="fixed inset-0 bg-slate-900/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl max-w-md w-full shadow-2xl overflow-hidden p-6" @click.away="modal = false">
            
            <h3 class="text-lg font-bold text-slate-800 mb-2" x-text="modalTitle"></h3>
            <p class="text-[10px] text-slate-400 font-bold uppercase mb-4" x-text="`Pilih ${selectedItem.jumlah} kunci ${selectedItem.jenis_kunci} yang tersedia`"></p>

            <template x-if="modalType === 'acc'">
                <div class="space-y-4">
                    <div class="max-h-72 overflow-y-auto pr-2 space-y-4 custom-scroll">
                        <template x-for="(n, index) in Array.from({length: selectedItem.jumlah})" :key="index">
                            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <label class="text-[9px] font-bold text-indigo-400 uppercase">Slot Kunci ke-<span x-text="index+1"></span></label>
                                <select x-model="noKunciArray[index]" class="w-full bg-transparent border-b border-indigo-200 py-2 font-bold text-slate-700 outline-none">
                                    <option value="">-- Pilih Nomor Kunci --</option>
                                    <template x-for="num in availableNumbers" :key="num">
                                        <option :value="num" x-text="num"></option>
                                    </template>
                                </select>
                            </div>
                        </template>
                    </div>

                    <button @click="prosesAcc()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg mt-4">
                        KONFIRMASI PENYERAHAN
                    </button>
                </div>
            </template>

            <button @click="modal = false" class="w-full mt-4 text-slate-400 text-[10px] font-bold uppercase text-center">Batal</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerManager() {
            return {
                list: [],
                searchQuery: '',
                modal: false,
                modalType: '',
                modalTitle: '',
                selectedItem: {},
                noKunciArray: [],
                availableNumbers: [],
                colors: { 'Request': 'bg-amber-100 text-amber-700', 'Sedang Di Pinjam': 'bg-indigo-600 text-white', 'Selesai': 'bg-emerald-100 text-emerald-700' },

                get filteredList() {
                    return this.list.filter(i => 
                        i.nama_peminjam.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                        (i.no_kunci && i.no_kunci.toLowerCase().includes(this.searchQuery.toLowerCase()))
                    );
                },

                async fetchData() {
                    const { data } = await _sb.from('peminjaman_loker').select('*').order('id', {ascending: false});
                    this.list = data || [];
                },

                openAcc(item) {
                    this.selectedItem = item;
                    this.modalType = 'acc';
                    this.modalTitle = 'Plotting Nomor Kunci';
                    this.noKunciArray = Array(item.jumlah).fill('');
                    
                    // Generate List 1-150 atau 1-100
                    const max = item.jenis_kunci === 'Perempuan' ? 150 : 100;
                    const prefix = item.jenis_kunci === 'Perempuan' ? 'P' : 'L';
                    
                    // Ambil daftar kunci yang sedang dipinjam (untuk filter)
                    const busyKeys = this.list
                        .filter(i => i.status === 'Sedang Di Pinjam' && i.no_kunci)
                        .flatMap(i => i.no_kunci.split(', '));

                    // Buat daftar nomor yang tersedia (bukan yang sedang dipinjam)
                    this.availableNumbers = Array.from({length: max}, (_, i) => prefix + (i + 1))
                                                 .filter(num => !busyKeys.includes(num));

                    this.modal = true;
                },

                async prosesAcc() {
                    if (this.noKunciArray.some(n => n === '')) return alert('Pilih semua nomor kunci!');
                    
                    // Cek duplikasi di input modal itu sendiri
                    if (new Set(this.noKunciArray).size !== this.noKunciArray.length) {
                        return alert('Nomor kunci tidak boleh sama!');
                    }

                    const formattedKunci = this.noKunciArray.join(', ');
                    const { error } = await _sb.from('peminjaman_loker').update({
                        no_kunci: formattedKunci,
                        status: 'Sedang Di Pinjam'
                    }).eq('id', this.selectedItem.id);

                    if(!error) { this.modal = false; this.fetchData(); alert('Berhasil dipinjamkan!'); }
                }
            }
        }
    </script>
</body>
</html>
