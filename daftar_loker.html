<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Peminjaman Loker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .btn-aksi {
            width: 80px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .badge-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-50 p-3 md:p-6" x-data="lokerList()" x-init="fetchData()">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-slate-100 p-3 rounded-xl text-slate-600 hover:bg-indigo-600 hover:text-white transition-all">
                    <i class="fa fa-home"></i>
                </a>
                <div>
                    <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Manajemen Loker</h2>
                    <p class="text-xs text-slate-500 font-medium italic">Data Peminjaman Kunci Loker</p>
                </div>
            </div>
            <a href="input_loker.html" class="w-full md:w-auto bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                <i class="fa fa-plus"></i> Tambah Pinjaman
            </a>
        </div>

        <div class="w-full overflow-x-auto bg-white rounded-2xl shadow-md border border-slate-200 custom-scroll">
            <table class="w-full text-left border-collapse min-w-[1200px]">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold text-[10px] uppercase">
                        <th class="p-4 text-center w-12">No</th>
                        <th class="p-4">Timestamp</th>
                        <th class="p-4">Peminjam & NIM</th>
                        <th class="p-4">Institusi & Jurusan</th>
                        <th class="p-4 text-center">Kunci</th>
                        <th class="p-4">Waktu Pinjam</th>
                        <th class="p-4 text-center">Durasi</th>
                        <th class="p-4 text-center">Status</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <template x-for="(item, i) in list" :key="item.id">
                        <tr class="border-b last:border-0 hover:bg-slate-50/50 transition-colors">
                            <td class="p-4 text-center font-mono text-slate-300" x-text="i+1"></td>
                            
                            <td class="p-4 text-[10px] text-slate-400 font-mono" x-text="formatDate(item.created_at)"></td>

                            <td class="p-4">
                                <div class="font-bold text-slate-800" x-text="item.nama_peminjam"></div>
                                <div class="text-[10px] text-indigo-600 font-bold" x-text="item.nim"></div>
                            </td>

                            <td class="p-4">
                                <div class="text-slate-700 font-medium" x-text="item.nama_institusi"></div>
                                <div class="text-[10px] text-slate-400" x-text="item.jurusan"></div>
                            </td>

                            <td class="p-4 text-center">
                                <span :class="item.jenis_kunci === 'Perempuan' ? 'bg-pink-50 text-pink-600' : 'bg-blue-50 text-blue-600'" 
                                      class="px-3 py-1 rounded-lg text-[10px] font-bold border border-current">
                                    <i class="fa mr-1" :class="item.jenis_kunci === 'Perempuan' ? 'fa-venus' : 'fa-mars'"></i>
                                    <span x-text="item.jenis_kunci"></span>
                                </span>
                            </td>

                            <td class="p-4">
                                <div class="text-[11px] font-medium text-slate-700">
                                    <i class="fa fa-arrow-right text-emerald-500 mr-1"></i><span x-text="item.tanggal_mulai"></span>
                                </div>
                                <div class="text-[11px] font-medium text-slate-700 mt-1">
                                    <i class="fa fa-arrow-left text-rose-500 mr-1"></i><span x-text="item.tanggal_selesai"></span>
                                </div>
                            </td>

                            <td class="p-4 text-center font-bold text-slate-600" x-text="calculateDuration(item.tanggal_mulai, item.tanggal_selesai)"></td>

                            <td class="p-4 text-center">
                                <span :class="colors[item.status]" class="badge-status" x-text="item.status"></span>
                            </td>

                            <td class="p-4">
                                <div class="flex items-center justify-center gap-2">
                                    <template x-if="item.status === 'Proses'">
                                        <button @click="openModal('upload', item.id)" class="btn-aksi bg-indigo-600 text-white hover:bg-indigo-700">
                                            KEMBALI
                                        </button>
                                    </template>
                                    
                                    <div class="flex items-center gap-1 border-l pl-2 border-slate-200">
                                        <template x-if="item.foto_url">
                                            <a :href="item.foto_url" target="_blank" class="w-8 h-8 flex items-center justify-center bg-sky-50 text-sky-600 rounded-lg hover:bg-sky-600 hover:text-white transition-all">
                                                <i class="fa fa-image text-xs"></i>
                                            </a>
                                        </template>
                                        <button @click="openModal('delete', item.id)" class="w-8 h-8 flex items-center justify-center bg-rose-50 text-rose-400 rounded-lg hover:bg-rose-600 hover:text-white transition-all">
                                            <i class="fa fa-trash text-[10px]"></i>
                                        </button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="modal" x-cloak class="fixed inset-0 bg-slate-900/70 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl max-w-sm w-full shadow-2xl overflow-hidden" @click.away="modal = false">
            <div class="p-6 pb-2 flex justify-between items-center">
                <h3 class="text-lg font-bold" x-text="modalType === 'upload' ? 'Upload Bukti Kembali' : 'Konfirmasi Hapus'"></h3>
                <button @click="modal = false" class="text-slate-300 hover:text-slate-600"><i class="fa fa-times-circle text-xl"></i></button>
            </div>

            <div class="p-6 pt-2">
                <template x-if="modalType === 'delete'">
                    <div>
                        <input type="password" x-model="password" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-4 text-center font-mono" placeholder="Password Admin">
                        <button @click="confirmDelete()" class="w-full py-4 rounded-2xl font-bold bg-rose-600 text-white hover:bg-rose-700">HAPUS DATA</button>
                    </div>
                </template>

                <template x-if="modalType === 'upload'">
                    <div class="text-center">
                        <div x-show="!isUploading">
                            <label class="cursor-pointer group block border-2 border-dashed border-slate-200 rounded-3xl p-10 hover:border-indigo-400">
                                <i class="fa fa-camera text-3xl text-slate-300 mb-2 group-hover:text-indigo-500 transition-colors"></i>
                                <p class="text-sm font-bold text-slate-700">Ambil Foto Bukti</p>
                                <input type="file" capture="environment" accept="image/*" @change="uploadPhoto" class="hidden">
                            </label>
                        </div>
                        <div x-show="isUploading" class="py-10">
                            <div class="animate-spin w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full mx-auto mb-2"></div>
                            <p class="text-xs font-bold text-indigo-600">Mengupload Bukti...</p>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerList() {
            return {
                list: [],
                modal: false,
                modalType: '',
                activeId: null,
                password: '',
                isUploading: false,
                colors: {
                    'Proses': 'bg-amber-100 text-amber-700 border border-amber-200',
                    'Selesai': 'bg-emerald-100 text-emerald-700 border border-emerald-200'
                },

                async fetchData() {
                    const { data } = await _sb.from('peminjaman_loker').select('*').order('id', {ascending: false});
                    this.list = data || [];
                },

                formatDate(dateStr) {
                    return new Date(dateStr).toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                },

                calculateDuration(start, end) {
                    const d1 = new Date(start);
                    const d2 = new Date(end);
                    const diffTime = Math.abs(d2 - d1);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                    return diffDays + " Hari";
                },

                openModal(type, id) {
                    this.modal = true; this.modalType = type; this.activeId = id; this.password = '';
                },

                async confirmDelete() {
                    if(this.password === '123456') {
                        await _sb.from('peminjaman_loker').delete().eq('id', this.activeId);
                        this.modal = false; this.fetchData();
                    } else { alert('Password Salah!'); }
                },

                async uploadPhoto(e) {
                    const file = e.target.files[0];
                    if(!file) return;
                    this.isUploading = true;
                    try {
                        const name = `loker_${this.activeId}_${Date.now()}.jpg`;
                        await _sb.storage.from('bukti-foto').upload(name, file);
                        const { data: { publicUrl } } = _sb.storage.from('bukti-foto').getPublicUrl(name);
                        await _sb.from('peminjaman_loker').update({ status: 'Selesai', foto_url: publicUrl }).eq('id', this.activeId);
                        this.modal = false; this.fetchData();
                        alert('Kunci Berhasil Dikembalikan!');
                    } catch (e) { alert(e.message); } finally { this.isUploading = false; }
                }
            }
        }
    </script>
</body>
</html>
