<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Loker - RSUD Bandung Kiwari</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> [x-cloak] { display: none !important; } </style>
</head>
<body class="bg-slate-50 p-4" x-data="lokerList()">
    <div class="max-w-6xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg">
                    <i class="fa fa-key text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 font-serif">Management Loker</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-black">RSUD Bandung Kiwari • Lantai 6</p>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto">
                <a href="input_loker.html" class="flex-1 md:flex-none bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 transition-all">
                    <i class="fa fa-plus-circle"></i>
                    INPUT BARU
                </a>
                
                <div class="relative flex-1 md:w-64">
                    <i class="fa fa-search absolute left-3 top-3 text-slate-400 text-xs"></i>
                    <input type="text" x-model="search" placeholder="Cari Nama/NIM..." 
                           class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-slate-200 outline-none shadow-sm focus:ring-2 ring-indigo-100 text-xs">
                </div>
                
                <button @click="fetchData" class="bg-white text-indigo-600 p-2.5 rounded-xl border border-slate-200 shadow-sm hover:bg-slate-50 transition-all">
                    <i class="fa fa-sync" :class="loading ? 'animate-spin' : ''"></i>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/80 border-b text-[10px] uppercase text-slate-400 font-black tracking-tighter">
                        <tr>
                            <th class="p-5">Data Peminjam</th>
                            <th class="p-5 text-center">Qty</th>
                            <th class="p-5">Nomor Kunci</th>
                            <th class="p-5 text-center text-indigo-600">Status</th>
                            <th class="p-5 text-center">Aksi Manajemen</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">
                        <template x-for="item in filteredLokers" :key="item.id">
                            <tr class="border-b last:border-0 hover:bg-slate-50/50 transition-colors">
                                <td class="p-5">
                                    <div class="font-bold text-slate-700 text-sm" x-text="item.nama_peminjam"></div>
                                    <div class="text-[10px] text-indigo-500 font-bold uppercase mt-0.5" x-text="item.nama_institusi"></div>
                                    <div class="text-[9px] text-slate-400 font-mono" x-text="'NIM: ' + item.nim"></div>
                                </td>
                                <td class="p-5 text-center">
                                    <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded-md font-bold text-xs" x-text="item.jumlah"></span>
                                </td>
                                <td class="p-5">
                                    <div class="flex flex-wrap gap-1 max-w-[150px]">
                                        <template x-if="item.no_kunci">
                                            <template x-for="k in item.no_kunci.split(',')" :key="k">
                                                <span class="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded border border-indigo-100 font-mono text-[10px] font-bold" x-text="k.trim()"></span>
                                            </template>
                                        </template>
                                        <span x-show="!item.no_kunci" class="text-slate-300 italic text-xs">Belum di-plot</span>
                                    </div>
                                </td>
                                <td class="p-5 text-center">
                                    <span :class="statusColor(item.status)" class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tight" x-text="item.status"></span>
                                </td>
                                <td class="p-5 text-center flex items-center justify-center gap-1.5">
    <template x-if="['Request', 'Booking'].includes(item.status)">
        <button @click="openActionModal(item)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-xl text-[10px] font-bold uppercase shadow-sm transition-all">
            Confirm
        </button>
    </template>
    
    <template x-if="item.status === 'Sedang Dipinjam'">
        <button @click="updateStatus(item.id, 'Selesai')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-xl text-[10px] font-bold uppercase shadow-sm transition-all">
            <i class="fa fa-check-circle mr-1"></i>Selesai
        </button>
    </template>

    <template x-if="['Request', 'Booking', 'Sedang Dipinjam'].includes(item.status)">
        <button @click="confirmCancel(item)" class="bg-rose-50 hover:bg-rose-500 hover:text-white text-rose-600 px-3 py-2 rounded-xl text-[10px] font-bold uppercase border border-rose-100 transition-all">
            Reject
        </button>
    </template>

    <button @click="deleteData(item)" class="bg-slate-100 hover:bg-red-600 hover:text-white text-slate-400 px-3 py-2 rounded-xl text-[10px] transition-all border border-slate-200">
        <i class="fa fa-trash"></i>
    </button>
</td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
            <div @click.away="showModal = false" class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 class="font-black text-slate-800 text-lg" x-text="selectedItem?.nama_peminjam"></h3>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Opsi Manajemen Loker</p>
                        </div>
                        <button @click="showModal = false" class="text-slate-300 hover:text-slate-500"><i class="fa fa-times text-xl"></i></button>
                    </div>

                    <div class="space-y-4">
                        <button @click="panggilWA()" class="w-full flex items-center justify-between bg-green-500 hover:bg-green-600 text-white p-4 rounded-2xl transition-all shadow-lg shadow-green-100">
                            <div class="text-left">
                                <p class="font-bold text-sm">Panggil via WA</p>
                                <p class="text-[9px] opacity-80 uppercase font-bold">Ubah Status Ke Booking</p>
                            </div>
                            <i class="fab fa-whatsapp text-2xl"></i>
                        </button>

                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                            <p class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center">Plot Nomor Kunci (<span x-text="selectedItem?.jumlah"></span> Unit)</p>
                            
                            <div class="space-y-3">
                                <template x-for="(n, index) in tempKeys" :key="index">
                                    <div class="flex items-center gap-2">
                                        <div class="bg-white text-[10px] font-black px-2 py-3 rounded-xl border border-slate-200 w-12 text-center text-slate-400 shadow-sm" x-text="'#' + (index+1)"></div>
                                        <select x-model="tempKeys[index]" class="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-sm outline-none focus:border-indigo-500 focus:ring-2 ring-indigo-50 font-bold shadow-sm">
                                            <option value="">-- Pilih Nomor --</option>
                                            <template x-for="num in getAvailableNumbers()" :key="num">
                                                <option :value="num" x-text="num"></option>
                                            </template>
                                        </select>
                                    </div>
                                </template>
                            </div>

                            <button @click="simpanPlotKunci()" class="w-full mt-5 bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-indigo-100 transition-all">
                                PINJAMKAN SEKARANG
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerList() {
            return {
                lokers: [],
                search: '',
                showModal: false,
                selectedItem: null,
                tempKeys: [],
                loading: false,
                adminPass: "diklat6",

                async init() { this.fetchData(); },

                async fetchData() {
                    this.loading = true;
                    const { data } = await _sb.from('peminjaman_loker').select('*').order('created_at', { ascending: false });
                    if (data) this.lokers = data;
                    this.loading = false;
                },

                get filteredLokers() {
                    return this.lokers.filter(i => 
                        i.nama_peminjam.toLowerCase().includes(this.search.toLowerCase()) || 
                        i.nim.toLowerCase().includes(this.search.toLowerCase())
                    );
                },

                statusColor(s) {
                    return {
                        'Request': 'bg-amber-100 text-amber-600',
                        'Booking': 'bg-purple-100 text-purple-600',
                        'Sedang Dipinjam': 'bg-indigo-600 text-white',
                        'Selesai': 'bg-green-100 text-green-600',
                        'Cancel': 'bg-rose-100 text-rose-600'
                    }[s] || 'bg-slate-100';
                },

                openActionModal(item) {
                    const pass = prompt("Otoritas Admin: Masukkan Password");
                    if (pass !== this.adminPass) return alert("Password Salah!");
                    this.selectedItem = item;
                    this.tempKeys = Array(item.jumlah).fill('');
                    this.showModal = true;
                },

                getAvailableNumbers() {
                    const prefix = this.selectedItem?.jenis_kunci === 'Laki-laki' ? 'L' : 'P';
                    const max = prefix === 'L' ? 100 : 150;
                    
                    const usedNumbers = this.lokers
                        .filter(i => ['Booking', 'Sedang Dipinjam'].includes(i.status) && i.no_kunci)
                        .flatMap(i => i.no_kunci.split(',').map(n => n.trim()));

                    let available = [];
                    for(let i=1; i<=max; i++) {
                        let num = prefix + i;
                        if (!usedNumbers.includes(num)) available.push(num);
                    }
                    return available;
                },

                async panggilWA() {
                    let phone = this.selectedItem.no_telp.replace(/\D/g, '');
                    phone = phone.startsWith('0') ? '62' + phone.slice(1) : phone;
                    const pesan = `Halo kak ${this.selectedItem.nama_peminjam}, Permohonan kunci loker Anda sudah kami setujui. Silakan datang ke Lantai 6 Ruang Diklat. Balas "YES" untuk booking.`;
                    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(pesan)}`, '_blank');
                    await this.updateStatus(this.selectedItem.id, 'Booking');
                    this.showModal = false;
                },

                async simpanPlotKunci() {
                    if (this.tempKeys.some(k => k === '')) return alert("Pilih semua nomor kunci!");
                    if (new Set(this.tempKeys).size !== this.tempKeys.length) return alert("Nomor kunci tidak boleh sama!");

                    const keyString = this.tempKeys.join(', ');
                    await this.updateStatus(this.selectedItem.id, 'Sedang Dipinjam', keyString);
                    this.showModal = false;
                },

                confirmCancel(item) {
                    if(confirm(`Batalkan/Reject peminjaman atas nama ${item.nama_peminjam}?`)) {
                        this.updateStatus(item.id, 'Cancel');
                    }
                },

                async updateStatus(id, status, noKunci = null) {
                    let payload = { status: status };
                    if (noKunci) payload.no_kunci = noKunci;
                    
                    const { error } = await _sb.from('peminjaman_loker').update(payload).eq('id', id);
                    if (!error) {
                        this.fetchData();
                    }
                }
            }
        }
    </script>
</body>
</html>
