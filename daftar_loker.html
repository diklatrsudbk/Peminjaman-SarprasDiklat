<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Loker - Lantai 6</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-6" x-data="lokerManager()" x-init="fetchData()">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-3 rounded-xl text-white shadow-lg shadow-indigo-100">
                    <i class="fa fa-key text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-black text-slate-800 tracking-tight">Admin Loker - Lantai 6</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Ruang Diklat</p>
                </div>
            </div>
            <a href="input_loker.html" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all">
                + Request Baru
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden custom-scroll overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[1100px]">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-[10px] font-bold uppercase">
                    <tr>
                        <th class="p-4 text-center">No</th>
                        <th class="p-4">Peminjam</th>
                        <th class="p-4">Kunci & Jumlah</th>
                        <th class="p-4">No. Kunci Fisik</th>
                        <th class="p-4">Status</th>
                        <th class="p-4 text-center">Aksi Manajemen</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <template x-for="(item, i) in list" :key="item.id">
                        <tr class="border-b last:border-0 hover:bg-slate-50/50 transition-colors">
                            <td class="p-4 text-center font-mono text-slate-300" x-text="i+1"></td>
                            
                            <td class="p-4">
                                <div class="font-bold text-slate-800" x-text="item.nama_peminjam"></div>
                                <div class="text-[10px] text-slate-400 font-medium" x-text="item.nim + ' | ' + item.jurusan"></div>
                            </td>

                            <td class="p-4">
                                <div class="flex items-center gap-2">
                                    <span :class="item.jenis_kunci === 'Perempuan' ? 'text-pink-600 bg-pink-50' : 'text-blue-600 bg-blue-50'" 
                                          class="px-2 py-1 rounded-md text-[10px] font-black border border-current uppercase">
                                        <i class="fa mr-1" :class="item.jenis_kunci === 'Perempuan' ? 'fa-venus' : 'fa-mars'"></i>
                                        <span x-text="item.jenis_kunci"></span>
                                    </span>
                                    <span class="font-black text-slate-700 bg-slate-100 px-2 py-1 rounded text-[10px]" x-text="'QTY: ' + item.jumlah"></span>
                                </div>
                            </td>

                            <td class="p-4">
                                <template x-if="item.no_kunci">
                                    <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg font-bold text-xs shadow-sm" x-text="item.no_kunci"></span>
                                </template>
                                <template x-if="!item.no_kunci">
                                    <span class="text-slate-300 italic text-xs">Belum di-plot</span>
                                </template>
                            </td>

                            <td class="p-4">
                                <span :class="colors[item.status]" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter" x-text="item.status"></span>
                            </td>

                            <td class="p-4">
                                <div class="flex justify-center items-center gap-2">
                                    
                                    <template x-if="item.status === 'Request'">
                                        <button @click="panggilPeserta(item)" class="h-9 px-4 bg-emerald-500 text-white rounded-lg text-[10px] font-bold hover:bg-emerald-600 flex items-center gap-2 transition-all">
                                            <i class="fab fa-whatsapp text-sm"></i> PANGGIL KE LT.6
                                        </button>
                                    </template>

                                    <template x-if="item.status === 'Request'">
                                        <button @click="openAcc(item.id)" class="h-9 px-4 bg-indigo-600 text-white rounded-lg text-[10px] font-bold hover:bg-indigo-700 flex items-center gap-2 transition-all">
                                            <i class="fa fa-key"></i> BERIKAN KUNCI
                                        </button>
                                    </template>

                                    <template x-if="item.status === 'Sedang Di Pinjam'">
                                        <button @click="openModal('upload', item.id)" class="h-9 px-4 bg-slate-800 text-white rounded-lg text-[10px] font-bold hover:bg-black transition-all">
                                            KEMBALIKAN KUNCI
                                        </button>
                                    </template>

                                    <button @click="openModal('delete', item.id)" class="w-9 h-9 flex items-center justify-center text-rose-300 hover:text-rose-600 transition-colors">
                                        <i class="fa fa-trash-alt"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="modal" x-cloak class="fixed inset-0 bg-slate-900/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl max-w-sm w-full shadow-2xl overflow-hidden p-6">
            
            <h3 class="text-lg font-bold text-slate-800 mb-4" x-text="modalTitle"></h3>

            <template x-if="modalType === 'acc'">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Input Nomor Kunci Fisik</p>
                    <input type="text" x-model="noKunciInput" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-4 text-center text-xl font-bold text-indigo-600 outline-none focus:border-indigo-500" placeholder="Contoh: L10, L12">
                    <button @click="prosesAcc()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">
                        PINJAMKAN SEKARANG
                    </button>
                </div>
            </template>

            <template x-if="modalType === 'delete'">
                <div>
                    <input type="password" x-model="password" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-4 text-center" placeholder="Password Admin">
                    <button @click="confirmDelete()" class="w-full bg-rose-600 text-white py-4 rounded-2xl font-bold">HAPUS PERMANEN</button>
                </div>
            </template>

            <button @click="modal = false" class="w-full mt-4 text-slate-400 text-xs font-bold uppercase tracking-widest">Batal</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerManager() {
            return {
                list: [],
                modal: false,
                modalType: '',
                modalTitle: '',
                activeId: null,
                noKunciInput: '',
                password: '',
                colors: {
                    'Request': 'bg-amber-100 text-amber-700',
                    'Sedang Di Pinjam': 'bg-indigo-600 text-white shadow-indigo-100',
                    'Selesai': 'bg-emerald-100 text-emerald-700'
                },

                async fetchData() {
                    const { data } = await _sb.from('peminjaman_loker').select('*').order('id', {ascending: false});
                    this.list = data || [];
                },

                panggilPeserta(item) {
                    const pesan = `Halo ${item.nama_peminjam}, Request kunci loker ${item.jenis_kunci} (${item.jumlah} buah) sudah kami terima. Silakan datang ke Lantai 6 Ruang Diklat untuk pengambilan kunci. Terima kasih.`;
                    const url = `https://wa.me/${item.no_telp}?text=${encodeURIComponent(pesan)}`;
                    window.open(url, '_blank');
                },

                openAcc(id) {
                    this.activeId = id;
                    this.modalType = 'acc';
                    this.modalTitle = 'Persetujuan Nomor Kunci';
                    this.noKunciInput = '';
                    this.modal = true;
                },

                async prosesAcc() {
                    if(!this.noKunciInput) return alert('Input nomor kunci fisik!');
                    
                    const { error } = await _sb.from('peminjaman_loker').update({
                        no_kunci: this.noKunciInput,
                        status: 'Sedang Di Pinjam'
                    }).eq('id', this.activeId);

                    if(!error) {
                        this.modal = false;
                        this.fetchData();
                        alert('Kunci telah diserahkan!');
                    }
                },

                openModal(type, id) {
                    this.activeId = id;
                    this.modalType = type;
                    this.modalTitle = type === 'delete' ? 'Hapus Data' : 'Kembalikan Kunci';
                    this.modal = true;
                },

                async confirmDelete() {
                    if(this.password !== '123456') return alert('Password Salah');
                    await _sb.from('peminjaman_loker').delete().eq('id', this.activeId);
                    this.modal = false;
                    this.fetchData();
                }
            }
        }
    </script>
</body>
</html>
