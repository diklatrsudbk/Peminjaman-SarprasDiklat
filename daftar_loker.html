<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Management Loker - RSUD Bandung Kiwari</title>

    [x-cloak] {
        display: none !important;

<body class="bg-slate-100 min-h-screen p-3 md:p-5 antialiased" x-data="lokerList()">

    <div class="max-w-7xl mx-auto">

        <!-- HEADER -->

            <div class="flex items-center gap-4">

                    <i class="fa fa-key text-white text-2xl"></i>
                </div>

                <div>
                    <h1 class="text-2xl font-bold text-slate-800">
                        Management Loker
                    </h1>

                    <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">
                        Lantai 6 • RSUD Bandung Kiwari
                    </p>
                </div>
            </div>

            <!-- ACTION -->
            <div class="flex flex-col lg:flex-row items-stretch lg:items-center gap-3 w-full lg:w-auto">

                <a href="input_loker.html"

                    Input Baru
                </a>

                <!-- SEARCH -->
                <div class="relative flex-1 md:w-64">
                    <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>

                    <input type="text"

                <!-- FILTER -->
                <select
                    x-model="filterStatus"
                    class="px-4 h-12 rounded-2xl border border-slate-200 bg-white text-sm font-semibold shadow-sm outline-none">

                    <option value="">Semua Status</option>
                    <option value="Request">Request</option>
                    <option value="Approved">Approved</option>
                    <option value="Booking">Booking</option>
                    <option value="Sedang Dipinjam">Sedang Dipinjam</option>
                    <option value="Overdue">Overdue</option>
                    <option value="Bukti Terkirim">Bukti Terkirim</option>
                    <option value="Selesai">Selesai</option>
                    <option value="Cancel">Cancel</option>
                </select>

                <!-- REFRESH -->
                <button
                    @click="fetchData"
                    :disabled="loading"

                    <i class="fa fa-sync"
                        :class="loading ? 'animate-spin' : ''"></i>
                </button>
            </div>
        </div>

        <!-- TABLE -->
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">

            <div class="overflow-x-auto">

                <table class="w-full text-left border-collapse min-w-[900px]">

                    <thead class="bg-slate-50 border-b text-xs uppercase text-slate-400 font-black">
                        <tr>
                            <th class="py-3 px-4">Peminjam</th>
                            <th class="py-3 px-4 text-center">Qty</th>
                            <th class="py-3 px-4">No. Kunci</th>
                            <th class="py-3 px-4 text-center">Status</th>
                            <th class="py-3 px-4 text-center w-[280px]">Aksi</th>
                        </tr>
                    </thead>

                    <tbody class="text-sm">

                        <!-- EMPTY -->
                        <template x-if="filteredLokers.length === 0">
                            <tr>
                                <td colspan="5" class="p-10 text-center text-slate-400">
                                    Tidak ada data ditemukan
                                </td>
                            </tr>
                        </template>

                        <!-- DATA -->
                        <template x-for="item in filteredLokers" :key="item.id">

                            <tr class="border-b border-slate-100 hover:bg-slate-50 transition align-middle">

                                <!-- PEMINJAM -->
                                <td class="p-4">
                                    <div class="font-bold text-slate-700"
                                        x-text="item.nama_peminjam">
                                    </div>

                                    <div class="text-xs text-slate-400 font-mono mt-1"
                                        x-text="'NIM : ' + item.nim">
                                    </div>
                                </td>

                                <!-- JUMLAH -->
                                <td class="p-4 text-center font-black text-slate-700"
                                    x-text="item.jumlah">
                                </td>

                                <!-- KUNCI -->
                                <td class="p-4">
                                    <div class="font-mono font-bold text-indigo-600"
                                        x-text="item.no_kunci || '-'">
                                    </div>
                                </td>

                                <!-- STATUS -->
                                <td class="p-4 text-center">
                                    <span
                                        :class="statusColor(item.status)"
                                        class="px-2.5 py-1 rounded-xl text-[10px] font-bold uppercase"
                                        x-text="item.status">
                                    </span>
                                </td>

                                <!-- AKSI -->
<td class="p-4">

    <div
        x-data="{ openMenu: false }"
        class="relative flex justify-center">

        <!-- BUTTON TITIK 3 -->
        <button
            @click="openMenu = !openMenu"

            <i class="fa fa-ellipsis-vertical text-slate-600"></i>
        </button>

        <!-- DROPDOWN MENU -->
        <div
            x-show="openMenu"
            x-transition
            @click.away="openMenu = false"
            class="absolute right-0 top-11 z-50 w-56 bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden">

            <div class="p-2 space-y-1">

                <!-- EDIT -->
                <template x-if="['Request','Booking'].includes(item.status)">
                    <a
                        :href="'input_loker.html?id=' + item.id"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-sky-50 text-sky-700 text-sm font-semibold transition">

                        <i class="fa fa-pen w-5"></i>
                        Edit Data
                    </a>
                </template>

                <!-- CONFIRM -->
                <template x-if="item.status === 'Request'">
                    <button
                        @click="openConfirmModal(item); openMenu=false"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-50 text-indigo-700 text-sm font-semibold transition">

                        <i class="fa fa-circle-check w-5"></i>
                        Confirm
                    </button>
                </template>

                <!-- PLOT -->
                <template x-if="item.status === 'Approved'">
                    <button
                        @click="openPlotAdmin(item); openMenu=false"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-purple-50 text-purple-700 text-sm font-semibold transition">

                        <i class="fa fa-key w-5"></i>
                        Plot Kunci
                    </button>
                </template>

                <!-- BUKTI FOTO -->
                <template x-if="['Sedang Dipinjam','Overdue'].includes(item.status)">
                    <button
                        @click="handleBuktiFoto(item); openMenu=false"

                        <i class="fa fa-camera w-5"></i>
                        Bukti Pengembalian

                </template>

                <!-- REMINDER -->

                        @click="ingatkanWA(item); openMenu=false"

                        <i class="fab fa-whatsapp w-5"></i>
                        Reminder WA
                    </button>
                </template>

                <!-- SELESAI -->
                <template x-if="item.status === 'Bukti Terkirim'">
                    <button
                        @click="updateStatus(item.id, 'Selesai'); openMenu=false"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-green-50 text-green-700 text-sm font-semibold transition">

                        <i class="fa fa-circle-check w-5"></i>
                        Tandai Selesai
                    </button>
                </template>

                <!-- CATATAN -->
                <button
    @click="openCatatan(item); openMenu=false"
    class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-700 text-sm font-semibold transition">

    <div class="flex items-center gap-3">
        <i class="fa fa-note-sticky w-5"></i>
        Catatan
    </div>

    <!-- TITIK WARNA -->
    <template x-if="item.catatan">

        <span
            :class="{

                'bg-red-500':
                    item.catatan.startsWith('MERAH|'),

                'bg-orange-500':
                    item.catatan.startsWith('OREN|'),

                'bg-green-500':
                    item.catatan.startsWith('HIJAU|')

            }"

            class="w-2.5 h-2.5 rounded-full">
        </span>

    </template>

</button>

                <!-- CANCEL -->
                <template x-if="['Request','Booking'].includes(item.status)">
                    <button
                        @click="confirmCancel(item); openMenu=false"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-700 text-sm font-semibold transition">

                        <i class="fa fa-ban w-5"></i>
                        Cancel
                    </button>
                </template>

                <!-- REJECT -->
                <template x-if="['Request','Approved','Booking','Sedang Dipinjam','Overdue'].includes(item.status)">
                    <button
                        @click="handleReject(item); openMenu=false"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-rose-50 text-rose-700 text-sm font-semibold transition">

                        <i class="fa fa-times-circle w-5"></i>
                        Reject
                    </button>
                </template>

                <!-- DELETE -->
                <template x-if="['Cancel','Selesai'].includes(item.status)">
                    <button
                        @click="deleteData(item); openMenu=false"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-red-50 text-red-700 text-sm font-semibold transition">

                        <i class="fa fa-trash w-5"></i>
                        Hapus
                    </button>
                </template>

            </div>

        </div>

    </div>

</td>

                            </tr>

                        </template>

                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- MODAL CONFIRM -->
    <div
        x-show="showConfirmModal"
        x-cloak
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">

        <div
            @click.away="showConfirmModal = false"
            class="bg-white rounded-3xl shadow-xl w-full max-w-sm p-6">

            <h3 class="text-xl font-black text-center text-slate-800 mb-5">
                Pilih Tindakan
            </h3>

            <div class="space-y-3">

                <button
                    @click="panggilWA()"
                    class="w-full bg-green-500 hover:bg-green-600 text-white p-4 rounded-2xl flex items-center justify-between font-bold shadow-lg">

                    <span>Chat WhatsApp</span>
                    <i class="fab fa-whatsapp text-2xl"></i>
                </button>

                <button
                    @click="showConfirmModal = false; openPlotAdmin(selectedItem)"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-2xl flex items-center justify-between font-bold shadow-lg">

                    <span>Plot Kunci Langsung</span>
                    <i class="fa fa-key"></i>
                </button>

            </div>

        </div>
    </div>

    <!-- MODAL PLOT -->
    <div
        x-show="showPlotModal"
        x-cloak
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">

        <div
            @click.away="showPlotModal = false"
            class="bg-white rounded-3xl shadow-xl w-full max-w-md p-6">

            <h3 class="text-lg font-black text-center uppercase text-slate-800 mb-5">
                Plotting Nomor Kunci
            </h3>

            <div class="space-y-3 bg-slate-50 p-4 rounded-2xl border">

                <template x-for="(n, index) in tempKeys" :key="index">

                    <div class="flex items-center gap-2">

                        <div
                            class="bg-white border rounded-xl w-12 py-3 text-center font-black text-xs">
                            <span x-text="'#' + (index + 1)"></span>
                        </div>

                        <select
                            x-model="tempKeys[index]"
                            class="w-full bg-white border rounded-xl p-3 font-semibold outline-none">

                            <option value="">-- Pilih Nomor --</option>

                            <template x-for="num in getAvailableNumbers(index)" :key="num">
                                <option :value="num" x-text="num"></option>
                            </template>

                        </select>
                    </div>

                </template>

                <button
                    @click="simpanPlotKunci()"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-black text-sm shadow-lg mt-3">

                    SIMPAN & PINJAMKAN
                </button>

            </div>

        </div>
    </div>

    <!-- MODAL CATATAN -->
<div
    x-show="showCatatanModal"
    x-cloak
    class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">

    <div
        @click.away="showCatatanModal = false"
        class="bg-white rounded-3xl shadow-xl w-full max-w-md p-6">

        <div class="flex items-center justify-between mb-4">

            <h3 class="text-lg font-black text-slate-800">
                Catatan
            </h3>

            <button
                @click="showCatatanModal = false"
                class="w-8 h-8 rounded-lg hover:bg-slate-100 text-slate-500">

                <i class="fa fa-times"></i>
            </button>
        </div>

        <div class="mb-4">

    <label class="block text-sm font-bold text-slate-700 mb-2">
        Jenis Catatan
    </label>

    <select
        x-model="catatanType"
        class="w-full h-12 rounded-2xl border border-slate-200 bg-white px-4 text-sm font-semibold outline-none focus:ring-2 ring-indigo-100">

        <option value="HIJAU">
            🟢 Info
        </option>

        <option value="OREN">
            🟠 Komplen
        </option>

        <option value="MERAH">
            🔴 Rusak / Hilang
        </option>

    </select>

</div>

        <textarea
            x-model="catatanText"
            rows="6"
            placeholder="Tulis catatan..."
            class="w-full border border-slate-200 rounded-2xl p-4 text-sm outline-none focus:ring-2 ring-indigo-100 resize-none"></textarea>

        <button
            @click="simpanCatatan()"
            class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-2xl font-bold shadow-lg">

            Simpan Catatan
        </button>

    </div>

</div>

    <!-- CAMERA -->
    <input
        type="file"
        accept="image/*"
        capture="environment"
        id="cameraInput"
        class="hidden" />

    <script>

        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co/";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";

        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerList() {

            return {

                lokers: [],
                search: '',
                filterStatus: '',

                selectedItem: null,

                showConfirmModal: false,
                showPlotModal: false,
                showCatatanModal: false,
                catatanText: '',
                catatanType: 'HIJAU',

                tempKeys: [],

                loading: false,

                adminPass: atob("ZGlrbGF0Ng=="),

                async init() {
                    this.fetchData();
                },

               async fetchData() {

    this.loading = true;

    try {

        const { data, error } = await _sb
            .from('peminjaman_loker')
            .select('*')
            .order('created_at', {
                ascending: false
            });

        if (error) throw error;

        const now = new Date();

        for (const item of data) {

            if (
                item.status === 'Sedang Dipinjam' &&
                item.tanggal_selesai
            ) {

                const tanggalSelesai =
                    new Date(item.tanggal_selesai);

                tanggalSelesai.setDate(
                    tanggalSelesai.getDate() + 1
                );

                if (now > tanggalSelesai) {

                    await _sb
                        .from('peminjaman_loker')
                        .update({
                            status: 'Overdue'
                        })
                        .eq('id', item.id);

                    item.status = 'Overdue';
                }
            }
        }

        this.lokers = data || [];

    } catch (err) {

        console.error(err);

        alert('Gagal mengambil data');

    } finally {

        this.loading = false;
    }
},

                get filteredLokers() {

                    return this.lokers.filter(i => {

                        const s = this.search.toLowerCase();

                        const noKunci =
                            i.no_kunci
                                ? i.no_kunci.toLowerCase()
                                : '';

                        const cocokSearch =
                            i.nama_peminjam.toLowerCase().includes(s)
                            || noKunci.includes(s);

                        const cocokStatus =
                            this.filterStatus === ''
                            || i.status === this.filterStatus;

                        return cocokSearch && cocokStatus;
                    });
                },

                statusColor(status) {

                    return {

                        'Request': 'bg-amber-100 text-amber-700',
                        'Approved': 'bg-purple-100 text-purple-700',
                        'Booking': 'bg-blue-100 text-blue-700',
                        'Sedang Dipinjam': 'bg-indigo-600 text-white',
                        'Overdue': 'bg-red-600 text-white',
                        'Bukti Terkirim': 'bg-cyan-100 text-cyan-700',
                        'Selesai': 'bg-green-100 text-green-700',
                        'Cancel': 'bg-rose-100 text-rose-700'
                        

                    }[status] || 'bg-slate-100 text-slate-600';
                },

                openConfirmModal(item) {

                const pass = prompt(
                    "Admin Only - Masukkan Password"
                );

                if (pass === null || pass.trim() === '') {
                    return;
                }

                if (pass !== this.adminPass) {
                    alert("Wrong Password!");
                    return;
                }

                this.selectedItem = item;
                this.showConfirmModal = true;
                },

                async panggilWA() {

                    let rawPhone =
                        this.selectedItem.no_telp.replace(/\D/g, '');

                    if (rawPhone.startsWith('0')) {
                        rawPhone = '62' + rawPhone.substring(1);
                    }

                    if (rawPhone.startsWith('8')) {
                        rawPhone = '62' + rawPhone;
                    }

                    const pesan =
`Halo ${this.selectedItem.nama_peminjam}

Permohonan peminjaman loker Anda telah disetujui.

Silakan datang ke Lantai 6 Ruang DIKLAT untuk pengambilan kunci.

Terima kasih.`;

                    window.open(
                        `https://wa.me/${rawPhone}?text=${encodeURIComponent(pesan)}`,
                        '_blank'
                    );

                    await this.updateStatus(
                        this.selectedItem.id,
                        'Approved'
                    );

                    this.showConfirmModal = false;
                },

                
                ingatkanWA(item) {

    let rawPhone =
        item.no_telp.replace(/\D/g, '');

    if (rawPhone.startsWith('0')) {
        rawPhone = '62' + rawPhone.substring(1);
    }

    if (rawPhone.startsWith('8')) {
        rawPhone = '62' + rawPhone;
    }

    const pesan =
`Halo ${item.nama_peminjam}

Kami mengingatkan bahwa peminjaman loker Anda telah melewati batas waktu pengembalian.

Mohon segera mengembalikan kunci loker ke Ruang DIKLAT Lantai 6.

Terima kasih.`;

    window.open(
        `https://wa.me/${rawPhone}?text=${encodeURIComponent(pesan)}`,
        '_blank'
    );
},

                openPlotAdmin(item) {

                    const pass = prompt(
                    "Admin Only - Masukkan Password"
                );

                if (pass === null || pass.trim() === '') {
                    return;
                }

                if (pass !== this.adminPass) {
                    alert("Wrong Password!");
                    return;
                }

                    this.openPlotModal(item);
                },

                openPlotModal(item) {

                    this.selectedItem = item;

                    this.tempKeys =
                        Array(item.jumlah).fill('');

                    this.showPlotModal = true;
                },
                
               openCatatan(item) {

    this.selectedItem = item;

    if (item.catatan && item.catatan.includes('|')) {

        const parts =
            item.catatan.split('|');

        this.catatanType =
            parts[0];

        this.catatanText =
            parts[1];

    } else {

        this.catatanType = 'HIJAU';

        this.catatanText =
            item.catatan || '';
    }

    this.showCatatanModal = true;
},

                getAvailableNumbers(currentIndex = null) {

                    const prefix =
                        this.selectedItem?.jenis_kunci === 'Laki-laki'
                            ? 'L'
                            : 'P';

                    const max =
                        prefix === 'L'
                            ? 100
                            : 150;

                    const usedNumbers = this.lokers
                        .filter(i =>
                            ['Approved', 'Sedang Dipinjam', 'Bukti Terkirim']
                            .includes(i.status)
                            && i.no_kunci
                        )
                        .flatMap(i =>
                            i.no_kunci
                                .split(',')
                                .map(n => n.trim())
                        );

                    const selectedTemp =
                        this.tempKeys.filter(
                            (k, i) => i !== currentIndex
                        );

                    let available = [];

                    for (let i = 1; i <= max; i++) {

                        let num = prefix + i;

                        if (
                            !usedNumbers.includes(num)
                            && !selectedTemp.includes(num)
                        ) {
                            available.push(num);
                        }
                    }

                    return available;
                },

                async simpanPlotKunci() {

                    if (this.tempKeys.some(k => k === '')) {

                        alert('Pilih semua nomor kunci');

                        return;
                    }

                    await this.updateStatus(
                        this.selectedItem.id,
                        'Sedang Dipinjam',
                        this.tempKeys.join(', ')
                    );

                    this.showPlotModal = false;
                },

                async handleBuktiFoto(item) {

                    const input =
                        document.getElementById('cameraInput');

                    input.value = '';

                    input.onchange = async (e) => {

                        const file = e.target.files[0];

                        if (!file) return;

                        const fileName =
                            `${Date.now()}_${item.nama_peminjam}.jpg`;

                        const { error: uploadError } =
                            await _sb.storage
                                .from('bukti-foto')
                                .upload(fileName, file);

                        if (uploadError) {

                            alert('Upload foto gagal');

                            return;
                        }

                        const { data } =
                            _sb.storage
                                .from('bukti-foto')
                                .getPublicUrl(fileName);

                        const fotoUrl = data.publicUrl;

                        await _sb
                            .from('peminjaman_loker')
                            .update({
                                status: 'Bukti Terkirim',
                                bukti_foto: fotoUrl
                            })
                            .eq('id', item.id);

                        alert('Foto berhasil dikirim');

                        this.fetchData();
                    };

                    input.click();
                },

                async handleReject(item) {

                    const pass = prompt(
                    "Admin Only - Masukkan Password"
                );

                if (pass === null || pass.trim() === '') {
                    return;
                }

                if (pass !== this.adminPass) {
                    alert("Wrong Password!");
                    return;
                }

                    const yakin =
                        confirm(
                            "Yakin reject peminjaman ini?"
                        );

                    if (!yakin) return;

                    await this.updateStatus(
                        item.id,
                        'Cancel'
                    );

                    alert('Peminjaman berhasil direject');
                },

                async confirmCancel(item) {

                    const yakin =
                        confirm(
                            "Yakin ingin membatalkan peminjaman?"
                        );

                    if (!yakin) return;

                    await this.updateStatus(
                        item.id,
                        'Cancel'
                    );

                    alert('Peminjaman berhasil dibatalkan');
                },

                async deleteData(item) {

                    const pass = prompt(
                    "Admin Only - Masukkan Password"
                );

                if (pass === null || pass.trim() === '') {
                    return;
                }

                if (pass !== this.adminPass) {
                    alert("Wrong Password!");
                    return;
                }

                    const yakin =
                        confirm(
                            "Yakin hapus data ini?"
                        );

                    if (!yakin) return;

                    await _sb
                        .from('peminjaman_loker')
                        .delete()
                        .eq('id', item.id);

                    this.fetchData();
                },


                async simpanCatatan() {

    const finalCatatan =
        `${this.catatanType}|${this.catatanText}`;

    const { error } = await _sb
        .from('peminjaman_loker')
        .update({
            catatan: finalCatatan
        })
        .eq('id', this.selectedItem.id);

    if (error) {

        alert('Gagal menyimpan catatan');

        return;
    }

    alert('Catatan berhasil disimpan');

    this.showCatatanModal = false;

    this.fetchData();
},

                async updateStatus(
                    id,
                    status,
                    noKunci = null
                ) {

                    let payload = {
                        status: status
                    };

                    if (noKunci) {
                        payload.no_kunci = noKunci;
                    }

                    const { error } =
                        await _sb
                            .from('peminjaman_loker')
                            .update(payload)
                            .eq('id', id);

                    if (error) {

                        alert('Gagal update status');

                        return;
                    }

                    this.fetchData();
                }

            };
        }

    </script>
