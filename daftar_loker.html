<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Loker - RSUD Bandung Kiwari</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> [x-cloak] { display: none !important; } </style>
</head>
<body class="bg-slate-50 p-4" x-data="lokerList()">
    <div class="max-w-6xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg">
                    <i class="fa fa-key text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 font-serif">Management Loker</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-black">RSUD Bandung Kiwari • Lantai 6</p>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto">
                <a href="input_loker.html" class="flex-1 md:flex-none bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 transition-all uppercase">
                    <i class="fa fa-plus-circle"></i> Input Baru
                </a>
                <div class="relative flex-1 md:w-64">
                    <i class="fa fa-search absolute left-3 top-3 text-slate-400 text-xs"></i>
                    <input type="text" x-model="search" placeholder="Cari Nama/NIM..." class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-slate-200 outline-none shadow-sm focus:ring-2 ring-indigo-100 text-xs font-bold">
                </div>
                <button @click="fetchData" class="bg-white text-indigo-600 p-2.5 rounded-xl border border-slate-200 shadow-sm hover:bg-slate-50">
                    <i class="fa fa-sync" :class="loading ? 'animate-spin' : ''"></i>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/80 border-b text-[10px] uppercase text-slate-400 font-black tracking-tighter">
                        <tr>
                            <th class="p-5">Data Peminjam</th>
                            <th class="p-5 text-center">Qty</th>
                            <th class="p-5">Nomor Kunci</th>
                            <th class="p-5 text-center">Status</th>
                            <th class="p-5 text-center">Aksi Manajemen</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">
                        <template x-for="item in filteredLokers" :key="item.id">
                            <tr class="border-b last:border-0 hover:bg-slate-50/50 transition-colors">
                                <td class="p-5">
                                    <div class="font-bold text-slate-700 text-sm" x-text="item.nama_peminjam"></div>
                                    <div class="text-[10px] text-indigo-500 font-bold uppercase" x-text="item.nama_institusi"></div>
                                    <div class="text-[9px] text-slate-400 font-mono uppercase" x-text="'NIM: ' + item.nim"></div>
                                </td>
                                <td class="p-5 text-center">
                                    <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded-md font-black text-xs" x-text="item.jumlah"></span>
                                </td>
                                <td class="p-5">
                                    <div class="flex flex-wrap gap-1 max-w-[150px]">
                                        <template x-if="item.no_kunci">
                                            <template x-for="k in item.no_kunci.split(',')" :key="k">
                                                <span class="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded border border-indigo-100 font-mono text-[10px] font-bold" x-text="k.trim()"></span>
                                            </template>
                                        </template>
                                        <span x-show="!item.no_kunci" class="text-slate-300 italic text-xs">Belum di-plot</span>
                                    </div>
                                </td>
                                <td class="p-5 text-center">
                                    <span :class="statusColor(item.status)" class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tight" x-text="item.status"></span>
                                </td>
                                <td class="p-5 text-center flex items-center justify-center gap-1.5">
                                    
                                    <template x-if="item.status === 'Request'">
                                        <button @click="openConfirmModal(item)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm transition-all">Confirm</button>
                                    </template>

                                    <template x-if="item.status === 'Booking'">
                                        <button @click="openPlotModal(item)" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm transition-all">Plot Kunci</button>
                                    </template>
                                    
                                    <template x-if="item.status === 'Sedang Dipinjam'">
                                        <button @click="uploadBuktiFoto(item)" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm transition-all">Bukti Foto</button>
                                    </template>

                                    <template x-if="item.status === 'Bukti Terkirim'">
                                        <button @click="updateStatus(item.id, 'Selesai')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase shadow-sm transition-all">Selesai</button>
                                    </template>

                                    <template x-if="['Request', 'Booking', 'Sedang Dipinjam'].includes(item.status)">
                                        <button @click="handleReject(item)" class="bg-rose-50 text-rose-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase border border-rose-100 transition-all">Reject</button>
                                    </template>

                                    <button @click="deleteData(item)" class="bg-slate-100 hover:bg-red-600 hover:text-white text-slate-400 px-3 py-2 rounded-xl text-[10px] transition-all border border-slate-200">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <div x-show="showPlotModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
            <div @click.away="showPlotModal = false" class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
                <div class="p-6">
                    <h3 class="font-black text-slate-800 text-lg mb-4 text-center">PLOT NOMOR KUNCI (<span x-text="selectedItem?.jumlah"></span> UNIT)</h3>
                    <div class="space-y-3 bg-slate-50 p-4 rounded-2xl border">
                        <template x-for="(n, index) in tempKeys" :key="index">
                            <div class="flex items-center gap-2">
                                <div class="bg-white text-[10px] font-black px-2 py-3 rounded-xl border w-12 text-center text-slate-400 shadow-sm" x-text="'#' + (index+1)"></div>
                                <select x-model="tempKeys[index]" class="w-full bg-white border p-2.5 rounded-xl text-sm outline-none focus:border-indigo-500 font-bold shadow-sm">
                                    <option value="">-- Pilih Nomor --</option>
                                    <template x-for="num in getAvailableNumbers()" :key="num">
                                        <option :value="num" x-text="num"></option>
                                    </template>
                                </select>
                            </div>
                        </template>
                        <button @click="simpanPlotKunci()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg transition-all">SIMPAN & PINJAMKAN</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerList() {
            return {
                lokers: [],
                search: '',
                selectedItem: null,
                showPlotModal: false,
                tempKeys: [],
                loading: false,
                adminPass: "diklat6",

                async init() { this.fetchData(); },

                async fetchData() {
                    this.loading = true;
                    const { data } = await _sb.from('peminjaman_loker').select('*').order('created_at', { ascending: false });
                    if (data) this.lokers = data;
                    this.loading = false;
                },

                get filteredLokers() {
                    return this.lokers.filter(i => 
                        i.nama_peminjam.toLowerCase().includes(this.search.toLowerCase()) || 
                        i.nim.toLowerCase().includes(this.search.toLowerCase())
                    );
                },

                statusColor(s) {
                    return {
                        'Request': 'bg-amber-100 text-amber-600',
                        'Booking': 'bg-purple-100 text-purple-600',
                        'Sedang Dipinjam': 'bg-indigo-600 text-white',
                        'Bukti Terkirim': 'bg-cyan-100 text-cyan-700 font-bold',
                        'Selesai': 'bg-green-100 text-green-600',
                        'Cancel': 'bg-rose-100 text-rose-600'
                    }[s] || 'bg-slate-100';
                },

                async openConfirmModal(item) {
                    const pass = prompt("Hanya Admin: Masukkan Password");
                    if (pass !== this.adminPass) return alert("Password Salah!");
                    
                    let rawPhone = item.no_telp.replace(/\D/g, '');
                    let phone = rawPhone.startsWith('0') ? '62' + rawPhone.slice(1) : rawPhone;
                    const pesan = `Halo kak ${item.nama_peminjam},\n\nPermohonan kunci loker Anda sudah disetujui. Silakan balas "YES" untuk booking.`;
                    
                    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(pesan)}`, '_blank');
                    await this.updateStatus(item.id, 'Booking');
                },

                openPlotModal(item) {
                    this.selectedItem = item;
                    this.tempKeys = Array(item.jumlah).fill('');
                    this.showPlotModal = true;
                },

                getAvailableNumbers() {
                    const prefix = this.selectedItem?.jenis_kunci === 'Laki-laki' ? 'L' : 'P';
                    const max = prefix === 'L' ? 100 : 150;
                    const usedNumbers = this.lokers
                        .filter(i => ['Booking', 'Sedang Dipinjam', 'Bukti Terkirim'].includes(i.status) && i.no_kunci)
                        .flatMap(i => i.no_kunci.split(',').map(n => n.trim()));

                    let available = [];
                    for(let i=1; i<=max; i++) {
                        let num = prefix + i;
                        if (!usedNumbers.includes(num)) available.push(num);
                    }
                    return available;
                },

                async simpanPlotKunci() {
                    if (this.tempKeys.some(k => k === '')) return alert("Pilih semua nomor kunci!");
                    if (new Set(this.tempKeys).size !== this.tempKeys.length) return alert("Nomor kunci tidak boleh sama!");
                    
                    await this.updateStatus(this.selectedItem.id, 'Sedang Dipinjam', this.tempKeys.join(', '));
                    this.showPlotModal = false;
                },

                async uploadBuktiFoto(item) {
                    if (confirm("Konfirmasi: Apakah Anda sudah menerima bukti foto pengembalian?")) {
                        await this.updateStatus(item.id, 'Bukti Terkirim');
                    }
                },

                async handleReject(item) {
                    if (confirm("Reject peminjaman ini?")) await this.updateStatus(item.id, 'Cancel');
                },

                async deleteData(item) {
                    if (prompt("Masukkan Password Admin untuk HAPUS:") !== this.adminPass) return alert("Salah!");
                    if (confirm("Hapus permanen?")) {
                        await _sb.from('peminjaman_loker').delete().eq('id', item.id);
                        this.fetchData();
                    }
                },

                async updateStatus(id, status, noKunci = null) {
                    let payload = { status: status };
                    if (noKunci) payload.no_kunci = noKunci;
                    const { error } = await _sb.from('peminjaman_loker').update(payload).eq('id', id);
                    if (!error) this.fetchData();
                }
            }
        }
    </script>
</body>
</html>
