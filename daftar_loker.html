    <script>

        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co/";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";

        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerList() {

            return {

                lokers: [],
                search: '',
                filterStatus: '',

                selectedItem: null,

                showConfirmModal: false,
                showPlotModal: false,
                showCatatanModal: false,
                showViewCatatan: false,
                viewCatatanText: '',
                viewCatatanColor: '',
                selectedCatatan: '',
                catatanText: '',
                catatanType: 'HIJAU',

                tempKeys: [],

                loading: false,

                adminPass: atob("ZGlrbGF0Ng=="),

                async init() {
                    this.fetchData();
                },

               async fetchData() {

    this.loading = true;

    try {

        const { data, error } = await _sb
            .from('peminjaman_loker')
            .select('*')
            .order('created_at', {
                ascending: false
            });

        if (error) throw error;

        const now = new Date();

        for (const item of data) {

            if (
                item.status === 'Sedang Dipinjam' &&
                item.tanggal_selesai
            ) {

                const tanggalSelesai =
                    new Date(item.tanggal_selesai);

                tanggalSelesai.setDate(
                    tanggalSelesai.getDate() + 1
                );

                if (now > tanggalSelesai) {

                    await _sb
                        .from('peminjaman_loker')
                        .update({
                            status: 'Overdue'
                        })
                        .eq('id', item.id);

                    item.status = 'Overdue';
                }
            }
        }

        this.lokers = data || [];

    } catch (err) {

        console.error(err);

        alert('Gagal mengambil data');

    } finally {

        this.loading = false;
    }
},

                get filteredLokers() {

                    return this.lokers.filter(i => {

                        const s = this.search.toLowerCase();

                        const noKunci =
                            i.no_kunci
                                ? i.no_kunci.toLowerCase()
                                : '';

                        const cocokSearch =
                            i.nama_peminjam.toLowerCase().includes(s)
                            || noKunci.includes(s);

                        const cocokStatus =
                            this.filterStatus === ''
                            || i.status === this.filterStatus;

                        return cocokSearch && cocokStatus;
                    });
                },

                statusColor(status) {

                    return {

                        'Selesai': 'bg-green-100 text-green-700',
                        'Cancel': 'bg-rose-100 text-rose-700'
                        

                    }[status] || 'bg-slate-100 text-slate-600';

               openCatatan(item) {

                getAvailableNumbers(currentIndex = null) {

    const prefix =
        this.selectedItem?.jenis_kunci === 'Laki-laki'
            ? 'L'
            : 'P';

    const max =
        prefix === 'L'
            ? 100
            : 150;

    // =========================
    // NOMOR MILIK DATA INI
    // =========================

    const currentKeys =
        this.selectedItem?.no_kunci
            ? this.selectedItem.no_kunci
                .split(',')
                .map(n => n.trim())
            : [];

    // =========================
    // NOMOR TERPAKAI ORANG LAIN
    // =========================

    const usedNumbers = this.lokers

        .filter(i => {

            return (
                i.id !== this.selectedItem.id &&
                ['Approved',
                 'Sedang Dipinjam',
                 'Bukti Terkirim',
                 'Overdue']
                .includes(i.status) &&
                i.no_kunci
            );
        })

        .flatMap(i =>
            i.no_kunci
                .split(',')
                .map(n => n.trim())
        );

    // =========================
    // NOMOR YANG SEDANG DIPILIH
    // =========================

    const selectedTemp =
        this.tempKeys.filter(
            (k, i) => i !== currentIndex
        );

    let available = [];

    for (let i = 1; i <= max; i++) {

        let num = prefix + i;

        if (
            (
                !usedNumbers.includes(num)
                || currentKeys.includes(num)
            )
            &&
            !selectedTemp.includes(num)
        ) {

            available.push(num);
        }
    }

    return available;
},
                async simpanPlotKunci() {

                    if (this.tempKeys.some(k => k === '')) {

                        alert('Pilih semua nomor kunci');

                        return;
                    }

                    await this.updateStatus(
                        this.selectedItem.id,
                        'Sedang Dipinjam',
                        this.tempKeys.join(', ')
                    );

                    this.showPlotModal = false;
                },

                async handleBuktiFoto(item) {

                    const input =
                        document.getElementById('cameraInput');

                    input.value = '';

                    input.onchange = async (e) => {

                        const file = e.target.files[0];

                        if (!file) return;

                        const fileName =
                            `${Date.now()}_${item.nama_peminjam}.jpg`;

                        const { error: uploadError } =
                            await _sb.storage
                                .from('bukti-foto')
                                .upload(fileName, file);

                        if (uploadError) {

                            alert('Upload foto gagal');

                            return;
                        }

                        const { data } =
                            _sb.storage
                                .from('bukti-foto')
                                .getPublicUrl(fileName);

                        const fotoUrl = data.publicUrl;

                        await _sb
                            .from('peminjaman_loker')
                            .update({
                                status: 'Bukti Terkirim',
                                bukti_foto: fotoUrl
                            })
                            .eq('id', item.id);

                        alert('Foto berhasil dikirim');

                        this.fetchData();
                    };

                    input.click();
                },

                async handleReject(item) {

                    const pass = prompt(
                    "Admin Only - Masukkan Password"
                );

                if (pass === null || pass.trim() === '') {
                    return;
                }

                if (pass !== this.adminPass) {
                    alert("Wrong Password!");
                    return;
                }

                    const yakin =
                        confirm(
                            "Yakin reject peminjaman ini?"
                        );

                    if (!yakin) return;

                    await this.updateStatus(
                        item.id,
                        'Cancel'
                    );

                    alert('Peminjaman berhasil direject');
                },

                async confirmCancel(item) {

                    const yakin =
                        confirm(
                            "Yakin ingin membatalkan peminjaman?"
                        );

                    if (!yakin) return;

                    await this.updateStatus(
                        item.id,
                        'Cancel'
                    );

                    alert('Peminjaman berhasil dibatalkan');
                },

                async deleteData(item) {

                    const pass = prompt(
                    "Admin Only - Masukkan Password"
                );

                if (pass === null || pass.trim() === '') {
                    return;
                }

                if (pass !== this.adminPass) {
                    alert("Wrong Password!");
                    return;
                }

                    const yakin =
                        confirm(
                            "Yakin hapus data ini?"
                        );

                    if (!yakin) return;

                    await _sb
                        .from('peminjaman_loker')
                        .delete()
                        .eq('id', item.id);

                    this.fetchData();
                },


                async simpanCatatan() {

    const finalCatatan =
        `${this.catatanType}|${this.catatanText}`;

    const { error } = await _sb
        .from('peminjaman_loker')
        .update({
            catatan: finalCatatan
        })
        .eq('id', this.selectedItem.id);

    if (error) {

        alert('Gagal menyimpan catatan');

        return;
    }

    alert('Catatan berhasil disimpan');

    this.showCatatanModal = false;

    this.fetchData();
},

                async updateStatus(
                    id,
                    status,
                    noKunci = null
                ) {

                    let payload = {
                        status: status
                    };

                    if (noKunci) {
                        payload.no_kunci = noKunci;
                    }

                    const { error } =
                        await _sb
                            .from('peminjaman_loker')
                            .update(payload)
                            .eq('id', id);

                    if (error) {

                        alert('Gagal update status');

                        return;
                    }

                    this.fetchData();
                }

            };
        }

    </script>
