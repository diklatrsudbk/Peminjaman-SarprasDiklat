<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Antrean Loker - RSUD Bandung Kiwari</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-4" x-data="lokerList()">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Antrean Kunci Loker</h1>
                <p class="text-sm text-slate-500">Manajemen Peminjaman Ruang Diklat Lt. 6</p>
            </div>
            <button @click="fetchData" class="bg-white p-3 rounded-full shadow-sm hover:rotate-180 transition-all duration-500">
                <i class="fa fa-sync text-indigo-600"></i>
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50">
                        <tr class="text-[10px] uppercase tracking-widest text-slate-400 border-b">
                            <th class="p-4">Peminjam</th>
                            <th class="p-4">Institusi/Jurusan</th>
                            <th class="p-4">Jenis/Qty</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">
                        <template x-for="item in lokers" :key="item.id">
                            <tr class="border-b hover:bg-slate-50/50 transition-colors">
                                <td class="p-4">
                                    <div class="font-bold text-slate-700" x-text="item.nama_peminjam"></div>
                                    <div class="text-[10px] text-slate-400 font-mono" x-text="item.nim"></div>
                                </td>
                                <td class="p-4">
                                    <div class="text-xs text-slate-600 font-medium" x-text="item.nama_institusi"></div>
                                    <div class="text-[10px] text-indigo-500 uppercase font-bold" x-text="item.jurusan"></div>
                                </td>
                                <td class="p-4 text-center">
                                    <span class="px-2 py-1 rounded-md bg-indigo-50 text-indigo-600 font-bold text-[10px]" x-text="item.jenis_kunci == 'Laki-laki' ? 'L' : 'P'"></span>
                                    <span class="ml-1 font-bold text-slate-700" x-text="item.jumlah"></span>
                                </td>
                                <td class="p-4">
                                    <span :class="{
                                        'bg-amber-100 text-amber-600': item.status === 'Request',
                                        'bg-green-100 text-green-600': item.status === 'Approved',
                                        'bg-blue-100 text-blue-600': item.status === 'Selesai'
                                    }" class="px-3 py-1 rounded-full text-[9px] font-black uppercase" x-text="item.status"></span>
                                </td>
                                <td class="p-4">
                                    <button x-show="item.status === 'Request' && !isAdminVerified(item.id)" 
                                            @click="verifyAdmin(item.id)" 
                                            class="bg-indigo-600 text-white px-3 py-2 rounded-xl text-[10px] font-bold shadow-md hover:bg-indigo-700 transition-all uppercase">
                                        Confirm
                                    </button>

                                    <div class="flex gap-2" x-show="isAdminVerified(item.id)">
                                        <button @click="panggilWA(item)" class="bg-green-500 text-white w-8 h-8 rounded-lg flex items-center justify-center hover:bg-green-600 transition-all shadow-sm shadow-green-100">
                                            <i class="fab fa-whatsapp"></i>
                                        </button>
                                        <button @click="plotKunci(item)" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold hover:bg-blue-700 shadow-sm shadow-blue-100 uppercase">
                                            Plot Kunci
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function lokerList() {
            return {
                lokers: [],
                verifiedIds: [], // Menyimpan ID yang sudah berhasil login password
                adminPass: "diklat6", // Silakan ganti password admin di sini

                async init() {
                    this.fetchData();
                },

                async fetchData() {
                    const { data, error } = await _sb
                        .from('peminjaman_loker')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (data) this.lokers = data;
                },

                verifyAdmin(id) {
                    const input = prompt("Hanya Admin: Masukkan Password");
                    if (input === this.adminPass) {
                        this.verifiedIds.push(id);
                    } else {
                        alert("Password Salah!");
                    }
                },

                isAdminVerified(id) {
                    return this.verifiedIds.includes(id);
                },

                panggilWA(item) {
                    // Normalisasi Nomor HP (Hapus 0 di depan ganti 62)
                    let phone = item.no_telp.replace(/^0/, '62');
                    
                    const pesan = `Halo kak ${item.nama_peminjam},\n\nPermohonan kunci loker Anda sudah kami proses. Silakan datang ke Lantai 6 Ruang Diklat RSUD Bandung Kiwari untuk pengambilan kunci loker.\n\nTerima kasih.`;
                    
                    const encodedPesan = encodeURIComponent(pesan);
                    const waUrl = `https://wa.me/${phone}?text=${encodedPesan}`;
                    
                    // Membuka jendela baru untuk WhatsApp
                    window.open(waUrl, '_blank');
                },

                plotKunci(item) {
                    const noKunci = prompt("Masukkan Nomor Kunci yang diberikan:");
                    if (noKunci) {
                        this.updateStatus(item.id, noKunci);
                    }
                },

                async updateStatus(id, noKunci) {
                    const { error } = await _sb
                        .from('peminjaman_loker')
                        .update({ 
                            status: 'Approved', 
                            no_kunci: noKunci 
                        })
                        .eq('id', id);

                    if (!error) {
                        alert("Kunci Berhasil Diplot!");
                        this.fetchData();
                    } else {
                        alert("Gagal update data");
                    }
                }
            }
        }
    </script>
</body>
</html>
