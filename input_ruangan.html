<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Peminjaman Ruangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-100 p-4 md:p-8" x-data="roomForm()" x-init="init()">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
        <!-- HEADER -->
        <div class="bg-blue-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Form Peminjaman Ruangan</h1>
                <p class="text-sm opacity-80">Lengkapi data di bawah ini</p>
            </div>
            <a href="daftar_ruangan.html" class="text-white hover:text-gray-200 text-3xl">&times;</a>
        </div>

        <form @submit.prevent="submit" class="p-6 md:p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div class="md:col-span-2 border-b pb-2 font-bold text-blue-600 uppercase text-sm tracking-widest">
                    <i class="fa fa-info-circle mr-2"></i> Informasi Acara & Ruangan
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Unit Peminjam</label>
                    <select x-model="f.unit_peminjam" class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Karyawan">Karyawan</option>
                        <option value="Peserta Didik">Peserta Didik</option>
                        <option value="Instansi Luar">Instansi Luar</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Keperluan</label>
                    <select x-model="f.keperluan_ruangan" required class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">-- Pilih Keperluan --</option>
                        <option>Rapat</option><option>Bimbingan</option><option>Sosialisasi</option>
                        <option>Pelatihan</option><option>Seminar</option><option>Lainnya</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-2">Judul Kegiatan</label>
                    <input type="text" x-model="f.judul_acara" required placeholder="Contoh: Rapat Koordinasi" class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- BAGIAN TANGGAL (SMART CHIPS) -->
                <div class="col-span-full">
                    <label class="block text-sm font-bold mb-2 text-gray-700">Tanggal Peminjaman</label>
                    
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <input id="multiPicker" type="text" readonly placeholder="Pilih tanggal acak..."
                               class="w-full border rounded-xl p-3 bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none pr-10">
                            <i class="fa fa-calendar absolute right-4 top-4 text-gray-400"></i>
                        </div>
                        
                        <input id="rangePicker" type="text" class="hidden">
                        
                        <button type="button" @click="rangePicker.open()" 
                                class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-700 shadow-md transition flex items-center gap-2">
                            <i class="fa fa-arrows-left-right"></i> + Rentang
                        </button>
                    </div>

                    <!-- DAFTAR CHIPS (SMART DISPLAY) -->
                    <div class="mt-3 flex flex-wrap gap-2 p-3 border border-dashed border-gray-300 rounded-xl bg-gray-50 min-h-[50px]">
                        <template x-if="f.tanggal.length === 0">
                            <span class="text-gray-400 text-xs italic">Belum ada tanggal dipilih.</span>
                        </template>

                        <!-- Loop melalui Grouped Dates -->
                        <template x-for="(group, index) in groupedDates" :key="index">
                            <div class="flex items-center bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm border border-blue-700 transition transform hover:scale-105">
                                <span x-text="group.label"></span>
                                <button type="button" @click="removeDateGroup(group.dates)" class="ml-2 bg-blue-800 rounded-full w-4 h-4 flex items-center justify-center hover:bg-red-500 transition">
                                    &times;
                                </button>
                            </div>
                        </template>
                    </div>
                </div>            

                <div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Jam Mulai</label>
                            <input type="time" x-model="f.jam_mulai" @change="calcDuration" class="w-full border rounded-xl p-3 outline-none">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Jam Selesai</label>
                            <input type="time" x-model="f.jam_selesai" @change="calcDuration" class="w-full border rounded-xl p-3 outline-none">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-600">Durasi</label>
                    <input type="text" x-model="f.durasi" readonly class="w-full bg-gray-50 border rounded-xl p-3 font-mono text-blue-600">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-600">Jumlah Peserta</label>
                    <input type="number" x-model="f.jumlah_peserta" class="w-full border rounded-xl p-3 outline-none">
                </div>

                <!-- IDENTITAS -->
                <div class="md:col-span-2 border-b pb-2 font-bold text-blue-600 uppercase text-sm tracking-widest mt-4">
                    <i class="fa fa-user mr-2"></i> Identitas Peminjam
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-2">Nama Lengkap</label>
                    <input type="text" x-model="f.nama" required class="w-full border rounded-xl p-3 outline-none bg-white">
                </div>

                <div x-show="f.unit_peminjam !== 'Karyawan'">
                    <label class="block text-sm font-semibold mb-2" x-text="f.unit_peminjam === 'Peserta Didik' ? 'NIM' : 'NIP / NIK'"></label>
                    <input type="text" x-model="f.identitas" class="w-full border rounded-xl p-3 outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase block text-center mb-2">Tanda Tangan</label>
                    <div class="relative bg-white rounded-2xl border-2 border-dashed border-slate-200 overflow-hidden">
                        <canvas id="signatureCanvas" width="600" height="180" style="touch-action:none;" class="w-full cursor-crosshair"></canvas>
                        <button type="button" @click="clearSignature()" class="absolute top-2 right-2 bg-rose-50 px-3 py-1 rounded-full text-[10px] font-bold text-rose-500 border border-rose-200">Hapus</button>
                    </div>
                </div>

                <button type="submit" :disabled="loading" class="md:col-span-2 w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-green-700 transition-all uppercase tracking-widest disabled:opacity-50">
                    <span x-show="!loading">Kirim Request Peminjaman</span>
                    <span x-show="loading">Sedang Mengirim...</span>
                </button>
            </div>
        </form>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function roomForm() {
            return { 
                loading: false, editId: null, canvas: null, ctx: null, drawing: false,
                multiPicker: null, rangePicker: null,
                
                f: {
                    unit_peminjam: 'Karyawan', keperluan_ruangan: '', judul_acara: '',
                    jumlah_peserta: '', tanggal: [], jam_mulai: '', jam_selesai: '',
                    durasi: '', nama: '', identitas: '32730000000000001',
                    institusi: 'RSUDBK', ttd_digital: '', status: 'Request'
                },

                init() {
                    // Signature Setup
                    this.canvas = document.getElementById("signatureCanvas");
                    this.ctx = this.canvas.getContext("2d");
                    this.resizeCanvas();
                    const startDraw = (e) => {
                        this.drawing = true;
                        const rect = this.canvas.getBoundingClientRect();
                        const x = (e.clientX || e.touches[0].clientX) - rect.left;
                        const y = (e.clientY || e.touches[0].clientY) - rect.top;
                        this.ctx.beginPath(); this.ctx.moveTo(x, y);
                    };
                    this.canvas.addEventListener("mousedown", startDraw);
                    this.canvas.addEventListener("mousemove", (e) => this.draw(e));
                    this.canvas.addEventListener("mouseup", () => this.drawing = false);
                    this.canvas.addEventListener("touchstart", (e) => { e.preventDefault(); startDraw(e); }, {passive:false});
                    this.canvas.addEventListener("touchmove", (e) => { e.preventDefault(); this.draw(e.touches[0]); }, {passive:false});
                    this.canvas.addEventListener("touchend", () => this.drawing = false);

                    // Flatpickr Multiple
                    this.multiPicker = flatpickr("#multiPicker", {
                        mode: "multiple", dateFormat: "Y-m-d",
                        onChange: (dates) => {
                            this.f.tanggal = dates.map(d => d.toISOString().split('T')[0]).sort();
                        }
                    });

                    // Flatpickr Range (untuk tombol Rentang)
                    this.rangePicker = flatpickr("#rangePicker", {
                        mode: "range", dateFormat: "Y-m-d",
                        onClose: (dates) => {
                            if (dates.length === 2) {
                                let start = new Date(dates[0]);
                                let end = new Date(dates[1]);
                                let temp = [...this.f.tanggal];
                                while (start <= end) {
                                    let s = start.toISOString().split('T')[0];
                                    if (!temp.includes(s)) temp.push(s);
                                    start.setDate(start.getDate() + 1);
                                }
                                this.f.tanggal = [...new Set(temp)].sort();
                                this.multiPicker.setDate(this.f.tanggal);
                            }
                        }
                    });
                },

                // LOGIKA PINTAR: Mengelompokkan tanggal berurutan untuk tampilan Chip
                get groupedDates() {
                    if (this.f.tanggal.length === 0) return [];
                    
                    const sorted = [...this.f.tanggal].sort();
                    const groups = [];
                    let currentGroup = [sorted[0]];

                    for (let i = 1; i <= sorted.length; i++) {
                        const prev = new Date(sorted[i - 1]);
                        const curr = sorted[i] ? new Date(sorted[i]) : null;
                        
                        // Cek apakah tanggal sekarang adalah besoknya dari tanggal sebelumnya
                        const isConsecutive = curr && (curr - prev === 86400000);

                        if (isConsecutive) {
                            currentGroup.push(sorted[i]);
                        } else {
                            // Tutup grup dan format labelnya
                            const start = new Date(currentGroup[0]);
                            const end = new Date(currentGroup[currentGroup.length - 1]);
                            const mNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
                            
                            let label = "";
                            if (currentGroup.length > 1) {
                                // Format Rentang: "2 - 25 Mei 2026"
                                label = `${start.getDate()} - ${end.getDate()} ${mNames[end.getMonth()]} ${end.getFullYear()}`;
                            } else {
                                // Format Tunggal: "2 Mei 2026"
                                label = `${start.getDate()} ${mNames[start.getMonth()]} ${start.getFullYear()}`;
                            }

                            groups.push({ label, dates: [...currentGroup] });
                            if (sorted[i]) currentGroup = [sorted[i]];
                        }
                    }
                    return groups;
                },

                removeDateGroup(datesToRemove) {
                    this.f.tanggal = this.f.tanggal.filter(t => !datesToRemove.includes(t));
                    this.multiPicker.setDate(this.f.tanggal);
                },

                resizeCanvas() {
                    this.canvas.width = this.canvas.offsetWidth;
                    this.ctx.lineWidth = 3; this.ctx.lineCap = "round"; this.ctx.strokeStyle = "#1e3a8a";
                },

                draw(e) {
                    if (!this.drawing) return;
                    const rect = this.canvas.getBoundingClientRect();
                    const x = (e.clientX || e.touches[0].clientX) - rect.left;
                    const y = (e.clientY || e.touches[0].clientY) - rect.top;
                    this.ctx.lineTo(x, y); this.ctx.stroke(); this.ctx.beginPath(); this.ctx.moveTo(x, y);
                },

                clearSignature() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); },

                calcDuration() {
                    if (this.f.jam_mulai && this.f.jam_selesai) {
                        const s = new Date(`2026-01-01T${this.f.jam_mulai}:00`);
                        const e = new Date(`2026-01-01T${this.f.jam_selesai}:00`);
                        let diff = (e - s) / 60000;
                        if (diff < 0) diff += 1440;
                        const h = Math.floor(diff / 60);
                        const m = diff % 60;
                        this.f.durasi = m > 0 ? `${h} Jam ${m} Menit` : `${h} Jam`;
                    }
                },

                async submit() {
                    if (this.f.tanggal.length === 0) return alert("Pilih tanggal!");
                    const isBlank = !this.ctx.getImageData(0,0,this.canvas.width,this.canvas.height).data.some(c => c !== 0);
                    if (isBlank) return alert("Tanda tangan wajib!");

                    this.loading = true;
                    try {
                        this.f.ttd_digital = this.canvas.toDataURL('image/png');
                        const finalData = { ...this.f, tanggal: this.f.tanggal.join(', ') };
                        const res = await _sb.from('peminjaman_ruangan').insert([finalData]);

                        if (!res.error) {
                            alert("Permintaan Berhasil Terkirim!");
                            window.location.replace('daftar_ruangan.html');
                        } else { alert("Gagal: " + res.error.message); }
                    } catch (err) { alert("Kesalahan sistem!"); }
                    finally { this.loading = false; }
                }
            }
        }
    </script>
</body>
</html>
