<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Peminjaman Ruangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-4 md:p-8" x-data="roomForm()">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
        <div class="bg-blue-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Form Peminjaman Ruangan</h1>
                <p class="text-sm opacity-80">Lengkapi data di bawah ini dengan benar</p>
            </div>
            <a href="daftar_ruangan.html" class="text-white hover:text-gray-200 text-3xl">&times;</a>
        </div>

        <form @submit.prevent="submit" class="p-6 md:p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div class="md:col-span-2 border-b pb-2 font-bold text-blue-600 uppercase text-sm tracking-widest">
                    <i class="fa fa-info-circle mr-2"></i> Informasi Acara & Ruangan
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Unit Peminjam</label>
                    <select x-model="f.unit_peminjam" class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        <option value="Karyawan">Karyawan</option>
                        <option value="Peserta Didik">Peserta Didik</option>
                        <option value="Instansi Luar">Instansi Luar</option>
                    </select>
                </div>

                <!-- JUDUL ACARA -->
<div class="md:col-span-2">
    <label class="block text-sm font-semibold mb-2">
        Judul Acara
    </label>

    <input
        type="text"
        x-model="f.judul_acara"
        required
        placeholder="Contoh: Rapat Koordinasi Tahunan"
        class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
</div>

<!-- KEPERLUAN -->
<div>
    <label class="block text-sm font-semibold mb-2">
        Keperluan Ruangan
    </label>

    <select
        x-model="f.keperluan_ruangan"
        class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">

        <option value="">-- Pilih Keperluan --</option>

        <option>Rapat</option>
        <option>Bimbingan</option>
        <option>Sosialisasi</option>
        <option>Ruang Belajar</option>
        <option>Kunjungan</option>
        <option>Pelatihan</option>
        <option>Pertemuan</option>
        <option>Penutupan</option>
        <option>Penerimaan</option>
        <option>Seminar</option>
        <option>Workshop</option>
        <option>Ujian</option>
        <option>Lainnya</option>

    </select>
</div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-2">Judul Acara</label>
                    <input type="text" x-model="f.judul_acara" required placeholder="Contoh: Rapat Koordinasi Tahunan" class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Pilih Tanggal (Bisa lebih dari satu)</label>
                    <input type="date" @change="addDate($event.target.value)" class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <div class="flex flex-wrap gap-2 mt-2">
                        <template x-for="(d, i) in f.tanggal" :key="i">
                            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-semibold flex items-center">
                                <span x-text="d"></span>
                                <button type="button" @click="f.tanggal.splice(i,1)" class="ml-2 text-red-500">&times;</button>
                            </span>
                        </template>
                    </div>
                </div>

                <div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Jam Mulai</label>
                            <input type="time" x-model="f.jam_mulai" @change="calcDuration" class="w-full border rounded-xl p-3 outline-none">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Jam Selesai</label>
                            <input type="time" x-model="f.jam_selesai" @change="calcDuration" class="w-full border rounded-xl p-3 outline-none">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-600">Durasi</label>
                    <input type="text" x-model="f.durasi" readonly class="w-full bg-gray-50 border rounded-xl p-3 font-mono text-blue-600">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-600">Jumlah Peserta</label>
                    <input type="number" x-model="f.jumlah_peserta" class="w-full border rounded-xl p-3 outline-none">
                </div>

                <div class="md:col-span-2 border-b pb-2 font-bold text-blue-600 uppercase text-sm tracking-widest mt-4">
                    <i class="fa fa-user mr-2"></i> Identitas Peminjam
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Nama Lengkap</label>
                    <input type="text" x-model="f.nama" required class="w-full border rounded-xl p-3 outline-none bg-white">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" x-text="f.unit_peminjam === 'Peserta Didik' ? 'NIM' : 'NIP / NIK'"></label>
                    <input type="text" x-model="f.identitas" class="w-full border rounded-xl p-3 outline-none bg-white">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" x-text="f.unit_peminjam === 'Karyawan' ? 'Nama Perusahaan' : 'Institusi'"></label>
                    <input type="text" x-model="f.institusi" :disabled="f.unit_peminjam === 'Karyawan'" class="w-full border rounded-xl p-3 outline-none bg-white disabled:bg-gray-200">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" x-text="f.unit_peminjam === 'Peserta Didik' ? 'Jurusan' : 'Divisi / Instalasi'"></label>
                    <input type="text" x-model="f.jurusan_divisi" class="w-full border rounded-xl p-3 outline-none bg-white">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold mb-2 text-gray-600">No. Telepon (WhatsApp)</label>
                    <input type="text" x-model="f.no_telepon" placeholder="08xxxx" class="w-full border rounded-xl p-3 outline-none bg-white">
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-green-700 transition-all uppercase tracking-widest">
                    Kirim Request Peminjaman
                </button>
            </div>
        </form>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function roomForm() {
            return {
                f: {
    unit_peminjam: 'Karyawan',

    nama_ruangan: '',
    keperluan_ruangan: '',

    judul_acara: '',
    catatan: '',

    jumlah_peserta: '',
    tanggal: [],

    jam_mulai: '',
    jam_selesai: '',
    durasi: '',

    nama: '',
    identitas: '',

    institusi: 'RSUDBK',
    jurusan_divisi: '',

    no_telepon: '',

    status: 'Request'
},

                addDate(val) {
                    if (val && !this.f.tanggal.includes(val)) {
                        this.f.tanggal.push(val);
                    }
                },

                calcDuration() {
                    if (this.f.jam_mulai && this.f.jam_selesai) {
                        const start = new Date(`2026-01-01 ${this.f.jam_mulai}`);
                        const end = new Date(`2026-01-01 ${this.f.jam_selesai}`);
                        let diff = (end - start) / 1000 / 60;
                        if (diff < 0) diff += 1440;
                        const h = Math.floor(diff / 60);
                        const m = diff % 60;
                        this.f.durasi = `${h} Jam ${m} Menit`;
                    }
                },

                async submit() {
                    if (this.f.tanggal.length === 0) return alert("Pilih minimal satu tanggal!");
                    
                    const { error } = await _sb.from('peminjaman_ruangan').insert([this.f]);
                    if (!error) {
                        alert("Data Berhasil Terkirim!");
                        window.location.href = 'daftar_ruangan.html';
                    } else {
                        alert("Error: " + error.message);
                    }
                }
            }
        }
    </script>
</body>
</html>
