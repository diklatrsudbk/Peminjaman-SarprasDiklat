<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Management Ruangan | Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
    [x-cloak] {
        display: none !important;
    }
    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
    }
    </style>
</head>

<body class="bg-[#f8faff] min-h-screen p-4 md:p-6 antialiased text-slate-700" x-data="roomList()">

 <div class="max-w-7xl mx-auto">

        <!-- HEADER -->
        <div class="flex flex-col lg:flex-row justify-between gap-4 mb-6">

            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fa fa-door-open text-white text-xl"></i>
            </div>
            <div>
                    <h1 class="text-2xl font-bold text-slate-800">
                        Management Ruangan
                    </h1>

                    <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">
                        DIKLAT • RSUD Bandung Kiwari
                    </p>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row items-stretch lg:items-center gap-3 w-full lg:w-auto">
            <a href="input_ruangan.html"
                    class="h-12 bg-indigo-600 hover:bg-indigo-700 text-white px-5 rounded-2xl text-xs font-bold shadow-lg flex items-center justify-center gap-2 transition-all uppercase">
                    <i class="fa fa-plus-circle"></i>
                    Input Baru
                </a>

            <div class="relative flex-1 md:w-64">
                <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" x-model="search" placeholder="Cari nama / ruangan..." 
                    class="w-full pl-10 pr-4 h-11 rounded-2xl border border-slate-100 bg-white text-sm font-medium outline-none focus:ring-2 ring-indigo-50 shadow-sm">
            </div>

            <select x-model="filterStatus" class="h-11 px-4 rounded-2xl border border-slate-100 bg-white text-sm font-bold text-slate-600 shadow-sm outline-none">
                <option value="">Semua Status</option>
                <option value="Request">Request</option>
                <option value="Approved">Approved</option>
                <option value="Booking">Booking</option>
                <option value="Sedang Di Pinjam">Sedang Di Pinjam</option>
                <option value="Overdue">Overdue</option>
                <option value="Bukti Terkirim">Bukti Terkirim</option>
                <option value="Selesai">Selesai</option>
                <option value="Cancel">Cancel</option>
            </select>

            <button @click="fetchData()" :disabled="isLoading" class="w-11 h-11 rounded-2xl border border-slate-100 bg-white flex items-center justify-center text-custom-purple hover:bg-slate-50 shadow-sm transition-all disabled:opacity-50">
                <i class="fa fa-sync-alt text-sm" :class="isLoading ? 'animate-spin' : ''"></i>
            </button>
        </div>
    </div>

    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden mb-12">
        
        <div x-show="isLoading" class="p-20 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-custom-purple border-t-transparent mb-4"></div>
            <p class="text-slate-400 font-medium text-sm">Memuat data dari server...</p>
        </div>

        <div class="bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden">

    <!-- TABLE WRAPPER -->
    <div class="overflow-x-auto">

        <table class="w-full min-w-[1100px] border-collapse">

            <!-- HEADER -->
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr class="text-[11px] uppercase tracking-wider text-slate-500">

                    <th class="px-6 py-4 text-left font-extrabold">
                        Peminjam
                    </th>

                    <th class="px-5 py-4 text-left font-extrabold">
                        Ruangan
                    </th>

                    <th class="px-5 py-4 text-left font-extrabold">
                        Jadwal
                    </th>

                    <th class="px-5 py-4 text-left font-extrabold">
                        Keperluan
                    </th>

                    <th class="px-5 py-4 text-left font-extrabold">
                        Divisi
                    </th>

                    <th class="px-5 py-4 text-left font-extrabold">
                        Judul Acara
                    </th>

                    <th class="px-6 py-4 text-right font-extrabold">
                        Aksi
                    </th>

                </tr>
            </thead>

            <!-- BODY -->
            <tbody class="divide-y divide-slate-100 text-sm bg-white">

                <template x-for="item in filteredList" :key="item.id">

                    <tr class="hover:bg-slate-50 transition duration-200">

                        <!-- PEMINJAM -->
                        <td class="px-6 py-5 align-top">
                            <div class="font-semibold text-slate-800 text-sm leading-tight"
                                 x-text="item.nama">
                            </div>

                            <div class="text-xs text-slate-400 mt-1"
                                 x-text="item.unit_peminjam || '-'">
                            </div>
                        </td>

                        <!-- RUANGAN -->
                        <td class="px-5 py-5 align-top">

                            <div class="font-bold text-slate-700 text-sm mb-2"
                                 x-text="item.nama_ruangan">
                            </div>

                            <span
                                :class="statusColor(item.status)"
                                class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wide">
                                <span x-text="item.status"></span>
                            </span>

                        </td>

                        <!-- TANGGAL -->
                        <td class="px-5 py-5 align-top">

                            <div class="flex items-center gap-2 text-sm text-slate-700 font-medium">

                                <i class="fa fa-calendar-day text-slate-400"></i>

                                <span x-text="formatDate(item.tanggal)"></span>

                            </div>

                            <div class="mt-2 text-xs font-semibold text-indigo-600"
                                 x-text="(item.jam_mulai || '--:--') + ' - ' + (item.jam_selesai || '--:--')">
                            </div>

                        </td>

                        <!-- KEPERLUAN -->
                        <td class="px-5 py-5 align-top">

                            <div class="text-sm text-slate-700 leading-relaxed"
                                 x-text="item.keperluan_ruangan || item.judul_acara || '-'">
                            </div>

                            <div class="mt-2 text-xs text-slate-500">
                                Qty :
                                <span class="font-semibold"
                                      x-text="item.jumlah || '1'">
                                </span>
                            </div>

                        </td>

                        <!-- DIVISI -->
                        <td class="px-5 py-5 align-top">

                            <div class="font-semibold text-slate-700 text-sm"
                                 x-text="item.institusi || 'RSUD Bandung Kiwari'">
                            </div>

                            <div class="text-xs text-slate-400 mt-1"
                                 x-text="item.jurusan || item.jurusan_divisi || '-'">
                            </div>

                        </td>

                        <!-- JUDUL -->
                        <td class="px-5 py-5 align-top max-w-[240px]">

                            <div class="text-sm text-slate-700 leading-relaxed line-clamp-2"
                                 x-text="item.judul_acara || '-'">
                            </div>

                        </td>

                        <!-- AKSI -->
                        <td class="px-6 py-5 text-right align-top">

                            <div
                                x-data="{ openMenu: false, menuStyle: {} }"
                                class="relative inline-block">

                                <!-- BUTTON -->
                                <button
                                    @click="
                                        openMenu = !openMenu;

                                        if(openMenu){
                                            const rect = $el.getBoundingClientRect();

                                            menuStyle = {
                                                top: rect.bottom + 8 + 'px',
                                                left: (rect.right - 210) + 'px'
                                            }
                                        }
                                    "
                                    @scroll.window="openMenu = false"
                                    class="w-10 h-10 rounded-2xl border border-slate-200 bg-white hover:bg-slate-100 transition flex items-center justify-center relative">

                                    <i class="fa fa-ellipsis-v text-slate-500 text-sm"></i>

                                    <span
                                        class="absolute top-1 right-1 w-2.5 h-2.5 rounded-full border-2 border-white"
                                        :class="item.status === 'Selesai'
                                            ? 'bg-green-500'
                                            : 'bg-orange-400'">
                                    </span>

                                </button>

                                <!-- DROPDOWN -->
                                <div
                                    x-show="openMenu"
                                    x-transition
                                    @click.away="openMenu = false"
                                    class="fixed z-[9999] w-52 bg-white rounded-2xl shadow-2xl border border-slate-200 p-2"
                                    :style="menuStyle">

                                    <template x-if="item.status === 'Request'">
                                        <button
                                            @click="openConfirm(item.id, 'Booking'); openMenu=false"
                                            class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-green-50 text-green-700 text-sm font-semibold">

                                            <i class="fa fa-check-circle"></i>
                                            Setujui Booking

                                        </button>
                                    </template>

                                    <template x-if="item.status === 'Booking'">
                                        <button
                                            @click="openUpload(item.id); openMenu=false"
                                            class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-blue-50 text-blue-700 text-sm font-semibold">

                                            <i class="fa fa-camera"></i>
                                            Ambil Ruangan

                                        </button>
                                    </template>

                                    <template x-if="item.status === 'Sedang Di Pinjam'">
                                        <button
                                            @click="updateStatus(item.id, 'Selesai'); openMenu=false"
                                            class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-emerald-50 text-emerald-700 text-sm font-semibold">

                                            <i class="fa fa-flag-checkered"></i>
                                            Selesai

                                        </button>
                                    </template>

                                    <template x-if="item.foto_url">
                                        <a
                                            :href="item.foto_url"
                                            target="_blank"
                                            class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-sky-50 text-sky-700 text-sm font-semibold">

                                            <i class="fa fa-image"></i>
                                            Lihat Bukti

                                        </a>
                                    </template>

                                    <div class="border-t border-slate-100 my-2"></div>

                                    <button
                                        @click="deleteData(item.id); openMenu=false"
                                        class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-red-50 text-red-600 text-sm font-semibold">

                                        <i class="fa fa-trash"></i>
                                        Hapus Data

                                    </button>

                                </div>

                            </div>

                        </td>

                    </tr>

                </template>

            </tbody>

        </table>

    </div>

</div>

        <div x-show="!isLoading && filteredList.length === 0" class="p-20 text-center">
            <div class="w-20 h-20 rounded-full bg-slate-50 flex items-center justify-center mx-auto mb-4 border border-slate-100">
                <i class="fa fa-folder-open text-3xl text-slate-300"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-700 mb-1">Data Tidak Ditemukan</h3>
            <p class="text-sm text-slate-400">Coba ubah kata kunci pencarian atau ganti filter status Anda.</p>
        </div>

    </div>
</div>

<input type="file" accept="image/*" capture="environment" id="cameraInput" class="hidden" />

<script>
const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
const _sb = supabase.createClient(SB_URL, SB_KEY);

function roomList() {
    return {
        list: [],
        search: '',
        filterStatus: '',
        isLoading: true,
        adminPass: atob("MTIzNDU2"),

        async init() {
            await this.fetchData();
        },

        async fetchData() {
            this.isLoading = true;
            try {
                const { data, error } = await _sb
                    .from('peminjaman_ruangan')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;
                this.list = data || [];
            } catch (e) {
                console.error(e);
            } finally {
                this.isLoading = false;
            }
        },

        get filteredList() {
            return this.list.filter(i => {
                const s = this.search.toLowerCase();
                const matchSearch = (i.nama || '').toLowerCase().includes(s) || 
                                  (i.judul_acara || '').toLowerCase().includes(s) || 
                                  (i.nama_ruangan || '').toLowerCase().includes(s);
                const matchStatus = this.filterStatus === '' || i.status === this.filterStatus;
                return matchSearch && matchStatus;
            });
        },

        formatDate(val) {
            if (!val) return '-';
            let arr = [];
            try {
                if (Array.isArray(val)) {
                    arr = val;
                } else if (typeof val === 'string') {
                    if (val.startsWith('[')) {
                        arr = JSON.parse(val);
                    } else {
                        arr = val.includes(',') ? val.split(',').map(s => s.trim()) : [val];
                    }
                }
            } catch (e) {
                return '-';
            }
            
            if (!arr || arr.length === 0) return '-';

            const dates = arr
                .map(d => new Date(d))
                .filter(d => !isNaN(d.getTime()))
                .sort((a, b) => a - b);

            if (dates.length === 0) return '-';

            const groups = [];
            let currentGroup = [dates[0]];

            for (let i = 1; i < dates.length; i++) {
                const prev = currentGroup[currentGroup.length - 1];
                const curr = dates[i];
                
                const d1 = new Date(prev.getFullYear(), prev.getMonth(), prev.getDate());
                const d2 = new Date(curr.getFullYear(), curr.getMonth(), curr.getDate());
                const diffTime = Math.abs(d2 - d1);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays === 1) {
                    currentGroup.push(curr);
                } else if (diffDays > 1) {
                    groups.push(currentGroup);
                    currentGroup = [curr];
                }
            }
            groups.push(currentGroup);

            const months = ['Jan', 'Mei', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];

            const formattedGroups = groups.map(group => {
                const start = group[0];
                const end = group[group.length - 1];
                
                const startDay = start.getDate();
                const startMonth = months[start.getMonth()];
                
                if (group.length === 1) {
                    return `${startDay} ${startMonth}`;
                } else {
                    const endDay = end.getDate();
                    const endMonth = months[end.getMonth()];
                    
                    if (start.getMonth() === end.getMonth() && start.getFullYear() === end.getFullYear()) {
                        return `${startDay} - ${endDay} ${startMonth}`;
                    } else {
                        return `${startDay} ${startMonth} - ${endDay} ${endMonth}`;
                    }
                }
            });

            return formattedGroups.join(' | ');
        },

        statusColor(status) {
            const colors = {
                'Request': 'bg-amber-50 text-amber-600 border border-amber-100',
                'Booking': 'bg-blue-50 text-blue-600 border border-blue-100',
                'Sedang Di Pinjam': 'bg-indigo-50 text-[#5850ec] border border-indigo-100',
                'Selesai': 'bg-emerald-50 text-emerald-600 border border-emerald-100',
                'Cancel': 'bg-rose-50 text-rose-600 border border-rose-100'
            };
            return colors[status] || 'bg-slate-100 text-slate-600';
        },

        async openConfirm(id, status) {
            const pass = prompt('Konfirmasi Admin (Password):');
            if (pass !== this.adminPass) return alert('Akses Ditolak');
            await this.updateStatus(id, status);
        },

        async updateStatus(id, status, extra = {}) {
            const { error } = await _sb
                .from('peminjaman_ruangan')
                .update({ status, ...extra })
                .eq('id', id);
            
            if (error) alert('Gagal memperbarui status');
            this.fetchData();
        },

        openUpload(id) {
            const input = document.getElementById('cameraInput');
            input.value = '';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                this.isLoading = true;
                const fileName = `bukti_${id}_${Date.now()}.jpg`;

                const { error: upErr } = await _sb.storage
                    .from('bukti-foto')
                    .upload(fileName, file);

                if (upErr) {
                    alert('Gagal upload gambar');
                    this.isLoading = false;
                    return;
                }

                const { data } = _sb.storage.from('bukti-foto').getPublicUrl(fileName);

                await this.updateStatus(id, 'Sedang Di Pinjam', { foto_url: data.publicUrl });
                alert('Ruangan berhasil di-aktifkan!');
            };
            input.click();
        },

        async deleteData(id) {
            const pass = prompt('Password Admin untuk menghapus:');
            if (pass !== this.adminPass) return alert('Password Salah');
            
            if (confirm('Data akan dihapus permanen. Lanjutkan?')) {
                await _sb.from('peminjaman_ruangan').delete().eq('id', id);
                this.fetchData();
            }
        }
    }
}
</script>

</body>
</html>
