<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Peminjaman Ruangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        /* Style khusus untuk scrollbar halus */
        .custom-scroll::-webkit-scrollbar { height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .btn-aksi {
            min-width: 90px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .badge-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-slate-50 p-3 md:p-6" x-data="roomList()" x-init="fetchData()">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-slate-100 p-3 rounded-xl text-slate-600 hover:bg-blue-600 hover:text-white transition-all">
                    <i class="fa fa-home"></i>
                </a>
                <div>
                    <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Manajemen Ruangan</h2>
                    <p class="text-xs text-slate-500 font-medium italic">Data Peminjaman Sarpras Diklat</p>
                </div>
            </div>
            <a href="input_ruangan.html" class="w-full md:w-auto bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                <i class="fa fa-plus"></i> Tambah Peminjam
            </a>
        </div>

        <div class="w-full overflow-x-auto bg-white rounded-2xl shadow-md border border-slate-200 custom-scroll">
            <table class="w-full text-left border-collapse min-w-[1000px]">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="p-4 text-center text-slate-400 font-bold text-[10px] uppercase w-12">No</th>
                        <th class="p-4 text-slate-600 font-bold text-[10px] uppercase">Detail Acara</th>
                        <th class="p-4 text-slate-600 font-bold text-[10px] uppercase">Waktu Pelaksanaan</th>
                        <th class="p-4 text-slate-600 font-bold text-[10px] uppercase">Peminjam</th>
                        <th class="p-4 text-slate-600 font-bold text-[10px] uppercase">Kontak</th>
                        <th class="p-4 text-center text-slate-600 font-bold text-[10px] uppercase">Status</th>
                        <th class="p-4 text-center text-slate-600 font-bold text-[10px] uppercase">Aksi Manajemen</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <template x-for="(item, i) in list" :key="item.id">
                        <tr class="border-b last:border-0 hover:bg-slate-50/50 transition-colors">
                            <td class="p-4 text-center font-mono text-slate-300" x-text="i+1"></td>
                            
                            <td class="p-4">
                                <div class="font-bold text-slate-800 leading-snug mb-1" x-text="item.judul_acara"></div>
                                <div class="inline-flex items-center gap-1.5 px-2 py-0.5 bg-blue-50 text-blue-600 rounded text-[9px] font-bold uppercase tracking-wide">
                                    <i class="fa fa-door-open text-[8px]"></i>
                                    <span x-text="item.nama_ruangan"></span>
                                </div>
                            </td>

                            <td class="p-4">
                                <div class="flex items-center gap-2 text-slate-700 font-medium">
                                    <i class="fa fa-calendar-day text-slate-300 text-[10px]"></i>
                                    <span x-text="item.tanggal ? item.tanggal.join(', ') : '-'"></span>
                                </div>
                                <div class="flex items-center gap-2 text-slate-400 text-[10px] mt-1 italic font-mono">
                                    <i class="fa fa-clock text-slate-200"></i>
                                    <span x-text="item.jam_mulai + ' - ' + item.jam_selesai"></span>
                                </div>
                            </td>

                            <td class="p-4">
                                <div class="font-bold text-slate-700" x-text="item.nama"></div>
                                <div class="text-[10px] text-slate-400" x-text="item.identitas + ' (' + item.jurusan_divisi + ')'"></div>
                            </td>

                            <td class="p-4">
                                <a :href="'https://wa.me/' + item.no_telepon" target="_blank" class="inline-flex items-center gap-2 text-emerald-600 hover:text-emerald-700 font-mono text-xs font-semibold bg-emerald-50 px-3 py-1.5 rounded-lg transition-colors border border-emerald-100">
                                    <i class="fab fa-whatsapp text-sm"></i>
                                    <span x-text="item.no_telepon || '-'"></span>
                                </a>
                            </td>

                            <td class="p-4 text-center">
                                <span :class="colors[item.status]" class="badge-status" x-text="item.status"></span>
                            </td>

                            <td class="p-4 text-center">
                                <div class="flex flex-wrap justify-center items-center gap-2">
                                    
                                    <template x-if="item.status === 'Request'">
                                        <div class="flex gap-2">
                                            <button @click="openModal('pass', item.id, 'Booking')" class="btn-aksi bg-emerald-500 text-white hover:bg-emerald-600 hover:shadow-md">
                                                <i class="fa fa-check"></i> Approve
                                            </button>
                                            <button @click="openModal('pass', item.id, 'Cancel')" class="btn-aksi bg-rose-500 text-white hover:bg-rose-600 hover:shadow-md">
                                                <i class="fa fa-times"></i> Reject
                                            </button>
                                        </div>
                                    </template>

                                    <template x-if="item.status === 'Booking'">
                                        <div class="flex gap-2">
                                            <button @click="openModal('upload', item.id)" class="btn-aksi bg-blue-600 text-white hover:bg-blue-700 hover:shadow-md shadow-blue-100">
                                                <i class="fa fa-camera"></i> Foto
                                            </button>
                                            <button @click="updateStatus(item.id, 'Cancel')" class="btn-aksi bg-slate-400 text-white hover:bg-slate-500">
                                                Cancel
                                            </button>
                                        </div>
                                    </template>

                                    <template x-if="item.status === 'Sedang Di Pinjam'">
                                        <button @click="updateStatus(item.id, 'Selesai')" class="btn-aksi bg-teal-600 text-white hover:bg-teal-700 shadow-md !min-w-[140px]">
                                            <i class="fa fa-flag-checkered"></i> Selesai
                                        </button>
                                    </template>

                                    <div class="flex items-center gap-1 border-l pl-2 border-slate-200">
                                        <template x-if="item.foto_url">
                                            <a :href="item.foto_url" target="_blank" class="w-8 h-8 flex items-center justify-center bg-sky-50 text-sky-600 rounded-lg hover:bg-sky-600 hover:text-white transition-all shadow-sm" title="Lihat Foto Bukti">
                                                <i class="fa fa-image text-xs"></i>
                                            </a>
                                        </template>
                                        <button @click="openModal('delete', item.id)" class="w-8 h-8 flex items-center justify-center bg-rose-50 text-rose-500 rounded-lg hover:bg-rose-600 hover:text-white transition-all shadow-sm" title="Hapus Data">
                                            <i class="fa fa-trash text-[10px]"></i>
                                        </button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="modal" x-cloak class="fixed inset-0 bg-slate-900/70 flex items-center justify-center p-4 z-50 backdrop-blur-sm" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
        <div class="bg-white rounded-3xl max-w-sm w-full shadow-2xl overflow-hidden border border-white/20" @click.away="modal = false">
            
            <div class="p-6 pb-2 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800" x-text="modalType === 'upload' ? 'Bukti Penggunaan' : 'Otoritas Sistem'"></h3>
                <button @click="modal = false" class="text-slate-300 hover:text-slate-600 transition-colors"><i class="fa fa-times-circle text-xl"></i></button>
            </div>

            <template x-if="modalType === 'pass' || modalType === 'delete'">
                <div class="p-6 pt-2">
                    <p class="text-[11px] text-slate-400 mb-4 text-center font-medium" x-text="modalType === 'delete' ? 'Tindakan ini permanen. Masukkan password admin.' : 'Konfirmasi perubahan status peminjaman.'"></p>
                    <input type="password" x-model="password" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-5 outline-none focus:border-blue-500 text-center text-xl tracking-widest font-mono transition-all" placeholder="••••••">
                    <button @click="confirmPass()" class="w-full py-4 rounded-2xl font-bold shadow-lg transition-all flex items-center justify-center gap-2" :class="modalType === 'delete' ? 'bg-rose-600 text-white hover:bg-rose-700' : 'bg-blue-600 text-white hover:bg-blue-700'">
                        <i class="fa" :class="modalType === 'delete' ? 'fa-trash-alt' : 'fa-shield-check'"></i>
                        <span x-text="modalType === 'delete' ? 'HAPUS PERMANEN' : 'KONFIRMASI AKSI'"></span>
                    </button>
                </div>
            </template>

            <template x-if="modalType === 'upload'">
                <div class="p-6 pt-2 text-center">
                    <div x-show="!isUploading">
                        <label class="cursor-pointer group block">
                            <div class="border-2 border-dashed border-slate-200 rounded-3xl p-10 group-hover:border-blue-400 group-hover:bg-blue-50/50 transition-all">
                                <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                                    <i class="fa fa-camera text-2xl text-blue-500"></i>
                                </div>
                                <p class="text-sm font-bold text-slate-700">Ambil Foto Bukti</p>
                                <p class="text-[10px] text-slate-400 mt-1">Gunakan kamera untuk bukti peminjaman</p>
                            </div>
                            <input type="file" capture="environment" accept="image/*" @change="uploadPhoto" class="hidden">
                        </label>
                    </div>
                    
                    <div x-show="isUploading" class="py-12">
                        <div class="relative w-12 h-12 mx-auto mb-4">
                            <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                            <div class="absolute inset-0 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        </div>
                        <p class="text-sm font-extrabold text-blue-600 animate-pulse">Sedang Memproses...</p>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function roomList() {
            return {
                list: [],
                modal: false,
                modalType: '',
                activeId: null,
                nextStatus: '',
                password: '',
                isUploading: false,
                colors: {
                    'Request': 'bg-amber-100 text-amber-700 border border-amber-200',
                    'Booking': 'bg-blue-600 text-white shadow-blue-100',
                    'Sedang Di Pinjam': 'bg-indigo-600 text-white shadow-indigo-100',
                    'Selesai': 'bg-emerald-100 text-emerald-700 border border-emerald-200',
                    'Cancel': 'bg-slate-100 text-slate-500 border border-slate-200'
                },

                async fetchData() {
                    const { data, error } = await _sb.from('peminjaman_ruangan').select('*').order('id', {ascending: false});
                    if(!error) this.list = data;
                },

                openModal(type, id, status = '') {
                    this.modal = true; 
                    this.modalType = type;
                    this.activeId = id; 
                    this.nextStatus = status;
                    this.password = '';
                },

                async confirmPass() {
                    if (this.password !== '123456') {
                        alert('Password Admin Salah!');
                        return;
                    }
                    this.isUploading = true;
                    try {
                        if (this.modalType === 'delete') {
                            const { data: item } = await _sb.from('peminjaman_ruangan').select('foto_url').eq('id', this.activeId).single();
                            if (item?.foto_url) {
                                const fileName = item.foto_url.split('/').pop();
                                await _sb.storage.from('bukti-foto').remove([fileName]);
                            }
                            await _sb.from('peminjaman_ruangan').delete().eq('id', this.activeId);
                            alert('Data terhapus!');
                        } else {
                            await this.updateStatus(this.activeId, this.nextStatus);
                        }
                        this.modal = false;
                        this.fetchData();
                    } catch (e) {
                        alert('Error: ' + e.message);
                    } finally {
                        this.isUploading = false;
                    }
                },

                async updateStatus(id, status, extra = {}) {
                    await _sb.from('peminjaman_ruangan').update({ status, ...extra }).eq('id', id);
                    this.fetchData();
                },

                async uploadPhoto(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    this.isUploading = true;
                    try {
                        const fileExt = file.name.split('.').pop();
                        const fileName = `bukti_${this.activeId}_${Date.now()}.${fileExt}`;
                        const { error: uploadError } = await _sb.storage.from('bukti-foto').upload(fileName, file);
                        if (uploadError) throw uploadError;

                        const { data: { publicUrl } } = _sb.storage.from('bukti-foto').getPublicUrl(fileName);
                        await this.updateStatus(this.activeId, 'Sedang Di Pinjam', { foto_url: publicUrl });
                        this.modal = false;
                        this.fetchData();
                        alert('Foto Bukti Berhasil diunggah!');
                    } catch (error) {
                        alert('Gagal: ' + error.message);
                    } finally {
                        this.isUploading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
