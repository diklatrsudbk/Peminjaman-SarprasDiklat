<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Management Ruangan</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
        /* Custom Warna Ungu sesuai Gambar */
        .bg-custom-purple { background-color: #5850ec; }
        .text-custom-purple { color: #5850ec; }
        .border-custom-purple { border-color: #5850ec; }
    </style>
</head>

<body class="bg-[#f8faff] min-h-screen p-4 md:p-6 antialiased" x-data="roomList()">

<div class="max-w-[1400px] mx-auto" x-cloak>

    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-8">
        
        <div class="flex items-center gap-4">
            <div class="bg-custom-purple w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-100">
                <i class="fa fa-key text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-[#1e293b]">Management Ruangan</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                    DIKLAT • RSUD BANDUNG KIWARI
                </p>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
            <a href="input_ruangan.html" class="bg-custom-purple hover:bg-indigo-700 text-white px-6 h-11 rounded-full text-[11px] font-black flex items-center gap-2 uppercase tracking-wider transition-all">
                <i class="fa fa-plus-circle"></i> Input Baru
            </a>

            <div class="relative flex-1 md:w-64">
                <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" x-model="search" placeholder="Cari nama / no kunci..." 
                    class="w-full pl-10 pr-4 h-11 rounded-2xl border border-slate-100 bg-white text-sm font-medium outline-none focus:ring-2 ring-indigo-50 shadow-sm">
            </div>

            <select x-model="filterStatus" class="h-11 px-4 rounded-2xl border border-slate-100 bg-white text-sm font-bold text-slate-700 shadow-sm outline-none">
                <option value="">Semua Status</option>
                <option>Request</option>
                <option>Booking</option>
                <option>Sedang Di Pinjam</option>
                <option>Selesai</option>
            </select>

            <button @click="fetchData()" class="w-11 h-11 rounded-2xl border border-slate-100 bg-white flex items-center justify-center text-custom-purple hover:bg-slate-50 shadow-sm transition-all">
                <i class="fa fa-sync-alt text-sm"></i>
            </button>
        </div>
    </div>

    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-50 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-[#fcfdff] border-b border-slate-50">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="py-5 px-8">Peminjam</th>
                        <th class="py-5 px-4 text-center">Status</th>
                        <th class="py-5 px-4">Institusi</th>
                        <th class="py-5 px-4">Periode</th>
                        <th class="py-5 px-4">Ruangan</th>
                        <th class="py-5 px-8 text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <template x-for="item in filteredList" :key="item.id">
                        <tr class="hover:bg-[#fcfdff] transition-all group">
                            <td class="py-6 px-8">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-indigo-50 text-custom-purple flex items-center justify-center text-[10px] font-black" x-text="item.nama.charAt(0)"></div>
                                    <div>
                                        <div class="font-bold text-slate-800 text-sm" x-text="item.nama"></div>
                                        <div class="flex items-center gap-2 mt-1">
                                            <span class="text-[10px] text-slate-400 font-bold">Qty : 1</span>
                                            <i class="fa fa-comment-dots text-orange-400 text-[10px]"></i>
                                        </div>
                                    </div>
                                </div>
                            </td>

                            <td class="py-6 px-4 text-center">
                                <span :class="statusColor(item.status)" 
                                    class="inline-block px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter" 
                                    x-text="item.status">
                                </span>
                            </td>

                            <td class="py-6 px-4">
                                <div class="text-sm font-bold text-slate-700 leading-tight" x-text="item.institusi || '-'"></div>
                                <div class="text-[10px] text-slate-400 font-medium mt-0.5" x-text="item.jurusan_divisi"></div>
                            </td>

                            <td class="py-6 px-4">
                                <div class="text-[11px] font-bold text-slate-700" x-text="formatDateRange(item.tanggal)"></div>
                                <div class="text-[10px] text-custom-purple font-bold mt-0.5">1 Hari</div>
                            </td>

                            <td class="py-6 px-4">
                                <div class="flex flex-wrap gap-1">
                                    <span class="px-3 py-1 rounded-full bg-indigo-50 text-custom-purple text-[9px] font-black border border-indigo-100" x-text="item.nama_ruangan"></span>
                                </div>
                            </td>

                            <td class="py-6 px-8 text-right">
                                <div x-data="{ openMenu: false }" class="relative inline-block">
                                    <button @click="openMenu = !openMenu" class="w-9 h-9 rounded-2xl border border-slate-100 flex items-center justify-center hover:bg-slate-50 transition-all">
                                        <i class="fa fa-ellipsis-v text-slate-400 text-xs"></i>
                                        <span class="absolute top-1 right-1 w-2 h-2 rounded-full border-2 border-white" :class="item.status === 'Selesai' ? 'bg-green-400' : 'bg-orange-400'"></span>
                                    </button>

                                    <div x-show="openMenu" @click.away="openMenu = false" x-transition 
                                        class="absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-2xl border border-slate-50 z-50 p-2">
                                        <button @click="openConfirm(item.id, 'Booking'); openMenu=false" class="w-full text-left px-4 py-2 text-[11px] font-bold text-slate-600 hover:bg-slate-50 rounded-xl">ACC Booking</button>
                                        <button @click="openUpload(item.id); openMenu=false" class="w-full text-left px-4 py-2 text-[11px] font-bold text-slate-600 hover:bg-slate-50 rounded-xl">Upload Bukti</button>
                                        <div class="h-[1px] bg-slate-50 my-1"></div>
                                        <button @click="deleteData(item.id); openMenu=false" class="w-full text-left px-4 py-2 text-[11px] font-bold text-red-500 hover:bg-red-50 rounded-xl">Hapus</button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>

<input type="file" accept="image/*" capture="environment" id="cameraInput" class="hidden" />

<script>
const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
const _sb = supabase.createClient(SB_URL, SB_KEY);

function roomList() {
    return {
        list: [], search: '', filterStatus: '', adminPass: atob("MTIzNDU2"),

        async init() { await this.fetchData(); },

        async fetchData() {
            const { data } = await _sb.from('peminjaman_ruangan').select('*').order('id', { ascending: false });
            this.list = data || [];
        },

        get filteredList() {
            return this.list.filter(i => {
                const s = this.search.toLowerCase();
                return ((i.nama || '').toLowerCase().includes(s) || (i.judul_acara || '').toLowerCase().includes(s))
                       && (this.filterStatus === '' || i.status === this.filterStatus);
            });
        },

        formatDateRange(val) {
            if (!val) return '-';
            const dates = typeof val === 'string' ? val.split(', ') : val;
            if (dates.length > 1) return `${dates[0]} - ${dates[dates.length-1]}`;
            return dates[0];
        },

        statusColor(status) {
            const colors = {
                'Request': 'bg-amber-50 text-amber-500',
                'Booking': 'bg-blue-50 text-blue-500',
                'Sedang Di Pinjam': 'bg-cyan-50 text-cyan-500', // Sesuai "BUKTI TERKIRIM" di gambar
                'Selesai': 'bg-emerald-50 text-emerald-500',
                'Cancel': 'bg-slate-50 text-slate-400'
            };
            return colors[status] || 'bg-slate-50 text-slate-400';
        },

        // Logic lainnya (updateStatus, deleteData, dsb) tetap sama seperti sebelumnya...
        async updateStatus(id, status, extra = {}) {
            await _sb.from('peminjaman_ruangan').update({ status, ...extra }).eq('id', id);
            this.fetchData();
        },

        async openConfirm(id, status) {
            const pass = prompt('Admin Password');
            if (pass === this.adminPass) this.updateStatus(id, status);
        },

        async deleteData(id) {
            const pass = prompt('Admin Password');
            if (pass === this.adminPass && confirm('Hapus data?')) {
                await _sb.from('peminjaman_ruangan').delete().eq('id', id);
                this.fetchData();
            }
        }
    }
}
</script>
</body>
</html>
