<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Management Ruangan</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>

        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: sans-serif;
        }

    </style>
</head>

<body
    class="bg-slate-100 min-h-screen p-3 md:p-5 antialiased"
    x-data="roomList()">

<div class="max-w-7xl mx-auto">

    <!-- HEADER -->
    <div class="flex flex-col lg:flex-row justify-between gap-4 mb-6">

        <div class="flex items-center gap-4">

            <div class="bg-indigo-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fa fa-door-open text-white text-2xl"></i>
            </div>

            <div>
                <h1 class="text-2xl font-bold text-slate-800">
                    Management Ruangan
                </h1>

                <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">
                    Sistem Peminjaman Ruangan
                </p>
            </div>

        </div>

        <!-- ACTION -->
        <div class="flex flex-col lg:flex-row items-stretch lg:items-center gap-3 w-full lg:w-auto">

            <a href="input_ruangan.html"
                class="h-12 bg-indigo-600 hover:bg-indigo-700 text-white px-5 rounded-2xl text-xs font-bold shadow-lg flex items-center justify-center gap-2 uppercase">

                <i class="fa fa-plus-circle"></i>
                Input Baru
            </a>

            <!-- SEARCH -->
            <div class="relative flex-1 md:w-64">

                <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>

                <input
                    type="text"
                    x-model="search"
                    placeholder="Cari nama / acara..."
                    class="w-full pl-9 pr-4 h-12 rounded-2xl border border-slate-200 bg-white text-sm font-semibold outline-none focus:ring-2 ring-indigo-100 shadow-sm" />
            </div>

            <!-- FILTER -->
            <select
                x-model="filterStatus"
                class="px-4 h-12 rounded-2xl border border-slate-200 bg-white text-sm font-semibold shadow-sm outline-none">

                <option value="">Semua Status</option>
                <option value="Request">Request</option>
                <option value="Booking">Booking</option>
                <option value="Sedang Di Pinjam">Sedang Di Pinjam</option>
                <option value="Selesai">Selesai</option>
                <option value="Cancel">Cancel</option>

            </select>

        </div>

    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">

        <div class="overflow-x-auto">

            <table class="w-full text-left border-collapse min-w-[1000px]">

                <thead class="bg-slate-50 border-b text-xs uppercase text-slate-400 font-black">

                    <tr>
                        <th class="py-3 px-4">Acara</th>
                        <th class="py-3 px-4">Peminjam</th>
                        <th class="py-3 px-4">Periode</th>
                        <th class="py-3 px-4 text-center">Status</th>
                        <th class="py-3 px-4 text-center w-[90px]">Aksi</th>
                    </tr>

                </thead>

                <tbody class="text-sm">

                    <template x-for="item in filteredList" :key="item.id">

                        <tr
                            :class="{
                                'bg-slate-100 opacity-70': item.status === 'Cancel',
                                'bg-emerald-50': item.status === 'Selesai'
                            }"
                            class="border-b border-slate-100 hover:bg-slate-50 transition align-middle">

                            <!-- ACARA -->
                            <td class="p-4 min-w-[250px]">

                                <div class="font-bold text-slate-800 leading-tight">
                                    <span x-text="item.judul_acara"></span>
                                </div>

                                <div class="mt-2 inline-flex items-center gap-2 px-3 py-1 rounded-xl bg-indigo-50 text-indigo-700 text-xs font-bold">
                                    <i class="fa fa-door-open"></i>
                                    <span x-text="item.nama_ruangan"></span>
                                </div>

                            </td>

                            <!-- PEMINJAM -->
                            <td class="p-4 min-w-[220px]">

                                <div class="font-bold text-slate-700">
                                    <span x-text="item.nama"></span>
                                </div>

                                <div class="text-xs text-slate-400 mt-1">
                                    <span x-text="item.identitas"></span>
                                    •
                                    <span x-text="item.jurusan_divisi"></span>
                                </div>

                                <a
                                    :href="'https://wa.me/' + item.no_telepon"
                                    target="_blank"
                                    class="inline-flex items-center gap-2 mt-3 text-emerald-600 text-xs font-bold bg-emerald-50 px-3 py-1 rounded-xl">

                                    <i class="fab fa-whatsapp"></i>

                                    <span x-text="item.no_telepon"></span>
                                </a>

                            </td>

                            <!-- PERIODE -->
                            <td class="p-4 min-w-[180px]">

                                <div class="text-sm font-bold text-slate-700">
                                    <span x-text="item.tanggal ? item.tanggal.join(', ') : '-'">
                                    </span>
                                </div>

                                <div class="mt-1 text-xs text-slate-400 font-semibold">
                                    <i class="fa fa-clock mr-1"></i>
                                    <span x-text="item.jam_mulai + ' - ' + item.jam_selesai"></span>
                                </div>

                            </td>

                            <!-- STATUS -->
                            <td class="p-4 text-center">

                                <span
                                    :class="statusColor(item.status)"
                                    class="px-3 py-1 rounded-full text-[10px] font-bold uppercase whitespace-nowrap"
                                    x-text="item.status">
                                </span>

                            </td>

                            <!-- AKSI -->
                            <td class="p-4">

                                <div
                                    x-data="{ openMenu: false }"
                                    class="relative flex justify-center">

                                    <button
                                        @click="openMenu = !openMenu"
                                        class="w-9 h-9 rounded-xl border border-slate-200 bg-white hover:bg-slate-100 flex items-center justify-center shadow-sm">

                                        <i class="fa fa-ellipsis-vertical text-slate-600"></i>

                                    </button>

                                    <!-- MENU -->
                                    <div
                                        x-show="openMenu"
                                        x-transition
                                        @click.away="openMenu = false"
                                        class="absolute right-0 top-11 z-50 w-56 bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden">

                                        <div class="p-2 space-y-1">

                                            <!-- ACC -->
                                            <template x-if="item.status === 'Request'">

                                                <button
                                                    @click="openConfirm(item.id, 'Booking'); openMenu=false"
                                                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-green-50 text-green-700 text-sm font-semibold transition">

                                                    <i class="fa fa-circle-check w-5"></i>
                                                    ACC Booking
                                                </button>

                                            </template>

                                            <!-- FOTO -->
                                            <template x-if="item.status === 'Booking'">

                                                <button
                                                    @click="openUpload(item.id); openMenu=false"
                                                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-blue-50 text-blue-700 text-sm font-semibold transition">

                                                    <i class="fa fa-camera w-5"></i>
                                                    Upload Bukti
                                                </button>

                                            </template>

                                            <!-- SELESAI -->
                                            <template x-if="item.status === 'Sedang Di Pinjam'">

                                                <button
                                                    @click="updateStatus(item.id, 'Selesai'); openMenu=false"
                                                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-emerald-50 text-emerald-700 text-sm font-semibold transition">

                                                    <i class="fa fa-flag-checkered w-5"></i>
                                                    Tandai Selesai
                                                </button>

                                            </template>

                                            <!-- FOTO -->
                                            <template x-if="item.foto_url">

                                                <a
                                                    :href="item.foto_url"
                                                    target="_blank"
                                                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-sky-50 text-sky-700 text-sm font-semibold transition">

                                                    <i class="fa fa-image w-5"></i>
                                                    Lihat Foto
                                                </a>

                                            </template>

                                            <!-- CANCEL -->
                                            <template x-if="['Request','Booking'].includes(item.status)">

                                                <button
                                                    @click="updateStatus(item.id, 'Cancel'); openMenu=false"
                                                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-700 text-sm font-semibold transition">

                                                    <i class="fa fa-ban w-5"></i>
                                                    Cancel
                                                </button>

                                            </template>

                                            <!-- DELETE -->
                                            <button
                                                @click="deleteData(item.id); openMenu=false"
                                                class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-red-50 text-red-700 text-sm font-semibold transition">

                                                <i class="fa fa-trash w-5"></i>
                                                Hapus
                                            </button>

                                        </div>

                                    </div>

                                </div>

                            </td>

                        </tr>

                    </template>

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- INPUT FILE -->
<input
    type="file"
    accept="image/*"
    capture="environment"
    id="cameraInput"
    class="hidden" />

<script>

const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";

const _sb = supabase.createClient(SB_URL, SB_KEY);

function roomList() {

    return {

        list: [],
        search: '',
        filterStatus: '',

        adminPass: atob("MTIzNDU2"),

        async init() {
            this.fetchData();
        },

        async fetchData() {

            const { data, error } = await _sb
                .from('peminjaman_ruangan')
                .select('*')
                .order('id', {
                    ascending: false
                });

            if (!error) {
                this.list = data;
            }
        },

        get filteredList() {

            return this.list.filter(i => {

                const s = this.search.toLowerCase();

                const cocokSearch =
                    i.nama.toLowerCase().includes(s)
                    || i.judul_acara.toLowerCase().includes(s)
                    || i.nama_ruangan.toLowerCase().includes(s);

                const cocokStatus =
                    this.filterStatus === ''
                    || i.status === this.filterStatus;

                return cocokSearch && cocokStatus;
            });
        },

        statusColor(status) {

            return {

                'Request': 'bg-amber-100 text-amber-700',
                'Booking': 'bg-blue-100 text-blue-700',
                'Sedang Di Pinjam': 'bg-indigo-600 text-white',
                'Selesai': 'bg-green-100 text-green-700',
                'Cancel': 'bg-slate-100 text-slate-500'

            }[status] || 'bg-slate-100 text-slate-600';
        },

        openConfirm(id, status) {

            const pass = prompt('Admin Password');

            if (pass !== this.adminPass) {
                alert('Password salah');
                return;
            }

            this.updateStatus(id, status);
        },

        async updateStatus(id, status, extra = {}) {

            await _sb
                .from('peminjaman_ruangan')
                .update({
                    status,
                    ...extra
                })
                .eq('id', id);

            this.fetchData();
        },

        openUpload(id) {

            const input = document.getElementById('cameraInput');

            input.value = '';

            input.onchange = async (e) => {

                const file = e.target.files[0];

                if (!file) return;

                const fileName =
                    `ruangan_${Date.now()}.jpg`;

                const { error } = await _sb
                    .storage
                    .from('bukti-foto')
                    .upload(fileName, file);

                if (error) {
                    alert('Upload gagal');
                    return;
                }

                const { data } = _sb
                    .storage
                    .from('bukti-foto')
                    .getPublicUrl(fileName);

                await this.updateStatus(
                    id,
                    'Sedang Di Pinjam',
                    {
                        foto_url: data.publicUrl
                    }
                );

                alert('Berhasil upload');
            };

            input.click();
        },

        async deleteData(id) {

            const pass = prompt('Admin Password');

            if (pass !== this.adminPass) {
                alert('Password salah');
                return;
            }

            const yakin = confirm('Hapus data ini?');

            if (!yakin) return;

            await _sb
                .from('peminjaman_ruangan')
                .delete()
                .eq('id', id);

            this.fetchData();
        }

    }
}

</script>

</body>
</html>
