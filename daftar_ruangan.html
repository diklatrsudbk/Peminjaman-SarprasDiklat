<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Management Ruangan | Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        [x-cloak] { display: none !important; }
        body {
        font-family: 'Plus Jakarta Sans', sans-serif;
    }
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .glass {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
}
    </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 min-h-screen p-3 md:p-6 antialiased text-slate-700" x-data="roomList()">

<div class="max-w-7xl mx-auto" x-cloak>

    <!-- HEADER & STATS -->
   <div class="mb-8">

    <div class="bg-white/80 backdrop-blur-xl border border-white/50 shadow-xl rounded-[2rem] p-6 md:p-8">

        <div class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-6">

            <!-- LEFT -->
            <div class="flex items-start gap-4">

                <div class="w-16 h-16 rounded-3xl bg-gradient-to-br from-indigo-600 to-blue-500 text-white flex items-center justify-center shadow-lg shadow-indigo-200">
                    <i class="fa fa-door-open text-2xl"></i>
                </div>

                <div>
                    <h1 class="text-3xl font-black tracking-tight text-slate-800">
                        Management Ruangan
                    </h1>

                    <p class="text-slate-500 mt-1 text-sm md:text-base">
                        Monitoring & pengelolaan peminjaman ruangan secara realtime
                    </p>
                </div>

            </div>

            <!-- RIGHT -->
            <div class="flex flex-wrap gap-3">

                <!-- CARD -->
                <div class="bg-amber-50 border border-amber-100 px-5 py-4 rounded-2xl min-w-[130px]">
                    <div class="text-[10px] uppercase font-black tracking-widest text-amber-500">
                        Request
                    </div>

                    <div class="text-2xl font-black text-amber-600 mt-1"
                        x-text="list.filter(i => i.status === 'Request').length">
                    </div>
                </div>

                <!-- CARD -->
                <div class="bg-blue-50 border border-blue-100 px-5 py-4 rounded-2xl min-w-[130px]">
                    <div class="text-[10px] uppercase font-black tracking-widest text-blue-500">
                        Dipinjam
                    </div>

                    <div class="text-2xl font-black text-blue-600 mt-1"
                        x-text="list.filter(i => i.status === 'Sedang Di Pinjam').length">
                    </div>
                </div>

                <!-- BUTTON -->
                <a href="input_ruangan.html"
                    class="h-[60px] px-7 rounded-2xl bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-black text-xs tracking-widest uppercase flex items-center gap-3 shadow-lg shadow-indigo-200 hover:scale-[1.02] active:scale-95 transition-all">

                    <i class="fa fa-plus-circle text-base"></i>
                    Input Baru

                </a>

            </div>

        </div>

    </div>

</div>

    <!-- SEARCH -->
                <div class="relative flex-1 md:w-64">
                    <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>

                    <input type="text"
                        x-model="search"
                        placeholder="Cari nama / no kunci..."
                        class="w-full pl-9 pr-4 h-12 rounded-2xl border border-slate-200 bg-white text-sm font-semibold outline-none focus:ring-2 ring-indigo-100 shadow-sm" />
                </div>

                <!-- FILTER -->
                <select
                    x-model="filterStatus"
                    class="px-4 h-12 rounded-2xl border border-slate-200 bg-white text-sm font-semibold shadow-sm outline-none">

                    <option value="">Semua Status</option>
                    <option value="Request">Request</option>
                    <option value="Approved">Approved</option>
                    <option value="Booking">Booking</option>
                    <option value="Sedang Dipinjam">Sedang Dipinjam</option>
                    <option value="Overdue">Overdue</option>
                    <option value="Bukti Terkirim">Bukti Terkirim</option>
                    <option value="Selesai">Selesai</option>
                    <option value="Cancel">Cancel</option>
                </select>

                <!-- REFRESH -->
                <button
                    @click="fetchData"
                    :disabled="loading"
                    class="bg-white hover:bg-slate-50 text-indigo-600 min-w-[48px] h-12 rounded-2xl border border-slate-200 shadow-sm disabled:opacity-50">

                    <i class="fa fa-sync"
                        :class="loading ? 'animate-spin' : ''"></i>
                </button>
            </div>
        </div>

    <!-- TABLE CONTAINER -->
    <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
        
        <!-- LOADING STATE -->
        <div x-show="isLoading" class="p-20 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-500 border-t-transparent mb-4"></div>
            <p class="text-slate-400 font-medium">Memuat data...</p>
        </div>

        <!-- TABLE -->
        <div x-show="!isLoading" class="overflow-x-auto custom-scroll">
            <table class="w-full text-left border-collapse min-w-[900px]">
                <thead class="bg-slate-50 border-b text-xs uppercase text-slate-400 font-black">
                        <th class="py-3 px-6">Informasi Acara</th>
                        <th class="py-3 px-6">Peminjam</th>
                        <th class="py-3 px-6">Waktu Penggunaan</th>
                        <th class="py-3 px-6 text-center">Status</th>
                        <th class="py-3 px-6 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="text-sm divide-y divide-slate-50">
                    <template x-for="item in filteredList" :key="item.id">
                        <tr class="group hover:bg-indigo-50/40 transition-all duration-200"
                            <!-- ACARA -->
                            <td class="p-6">
                                <div class="font-bold text-slate-800 text-base mb-1" x-text="item.judul_acara"></div>
                                <div class="flex items-center gap-1.5 text-indigo-600 font-bold text-[11px] bg-indigo-50 w-fit px-2 py-0.5 rounded-lg">
                                    <i class="fa fa-location-dot"></i>
                                    <span x-text="item.nama_ruangan"></span>
                                </div>
                            </td>

                            <!-- PEMINJAM -->
                            <td class="p-6">
                                <div class="font-bold text-slate-700" x-text="item.nama"></div>
                                <div class="text-[11px] text-slate-400 font-medium" x-text="item.identitas + ' • ' + item.jurusan_divisi"></div>
                                <a :href="'https://wa.me/' + item.no_telepon" target="_blank" 
                                    class="inline-flex items-center gap-1.5 mt-2 text-emerald-600 font-bold hover:underline">
                                    <i class="fab fa-whatsapp"></i>
                                    <span x-text="item.no_telepon"></span>
                                </a>
                            </td>

                            <!-- WAKTU -->
                            <td class="p-6 text-slate-600">
                                <div class="font-bold mb-1">
                                    <i class="fa fa-calendar-day mr-1 text-slate-300"></i>
                                    <span x-text="formatDate(item.tanggal)"></span>
                                </div>
                                <div class="text-xs font-semibold flex items-center gap-1 text-slate-400">
                                    <i class="fa fa-clock"></i>
                                    <span x-text="item.jam_mulai + ' - ' + item.jam_selesai"></span>
                                </div>
                            </td>

                            <!-- STATUS -->
                            <td class="p-6 text-center">
                                <span :class="statusColor(item.status)" 
                                    class="inline-block px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-wider shadow-sm" 
                                    x-text="item.status">
                                </span>
                            </td>

                            <!-- AKSI -->
                            <td class="p-6 text-center">
                                <div x-data="{ openMenu: false }" class="relative inline-block text-left">
                                    <button @click="openMenu = !openMenu" 
                                        class="w-10 h-10 rounded-xl hover:bg-white hover:shadow-md border border-transparent hover:border-slate-100 flex items-center justify-center transition-all">
                                        <i class="fa fa-ellipsis-v text-slate-400 group-hover:text-slate-600"></i>
                                    </button>

                                    <!-- DROPDOWN MENU -->
                                    <div x-show="openMenu" @click.away="openMenu = false" x-transition 
                                        class="absolute right-0 mt-2 w-52 bg-white rounded-2xl shadow-2xl border border-slate-100 z-50 overflow-hidden p-1.5">
                                        
                                        <template x-if="item.status === 'Request'">
                                            <button @click="openConfirm(item.id, 'Booking'); openMenu=false" class="w-full text-left flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-green-50 text-green-700 text-xs font-bold">
                                                <i class="fa fa-check-circle"></i> Setujui Booking
                                            </button>
                                        </template>

                                        <template x-if="item.status === 'Booking'">
                                            <button @click="openUpload(item.id); openMenu=false" class="w-full text-left flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-blue-50 text-blue-700 text-xs font-bold">
                                                <i class="fa fa-camera"></i> Ambil Ruangan
                                            </button>
                                        </template>

                                        <template x-if="item.status === 'Sedang Di Pinjam'">
                                            <button @click="updateStatus(item.id, 'Selesai'); openMenu=false" class="w-full text-left flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-emerald-50 text-emerald-700 text-xs font-bold">
                                                <i class="fa fa-flag-checkered"></i> Selesai
                                            </button>
                                        </template>

                                        <template x-if="item.foto_url">
                                            <a :href="item.foto_url" target="_blank" class="w-full text-left flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-sky-50 text-sky-700 text-xs font-bold">
                                                <i class="fa fa-image"></i> Lihat Bukti
                                            </a>
                                        </template>

                                        <div class="h-[1px] bg-slate-50 my-1"></div>

                                        <button @click="deleteData(item.id); openMenu=false" class="w-full text-left flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-red-50 text-red-600 text-xs font-bold">
                                            <i class="fa fa-trash"></i> Hapus Data
                                        </button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- EMPTY -->
<div
    x-show="!isLoading && filteredList.length === 0"
    class="p-20 text-center">

    <div class="w-24 h-24 rounded-full bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center mx-auto mb-6 shadow-inner">

        <i class="fa fa-folder-open text-4xl text-slate-400"></i>

    </div>

    <h3 class="text-2xl font-black text-slate-700 mb-2">
        Data Tidak Ditemukan
    </h3>

    <p class="text-slate-400">
        Coba ubah pencarian atau filter status
    </p>

</div>

<!-- HIDDEN CAMERA INPUT -->
<input type="file" accept="image/*" capture="environment" id="cameraInput" class="hidden" />

<script>
const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
const _sb = supabase.createClient(SB_URL, SB_KEY);

function roomList() {
    return {
        list: [],
        search: '',
        filterStatus: '',
        isLoading: true,
        adminPass: atob("MTIzNDU2"), // 123456

        async init() {
            await this.fetchData();
        },

        async fetchData() {
            this.isLoading = true;
            try {
                const { data, error } = await _sb
                    .from('peminjaman_ruangan')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;
                this.list = data;
            } catch (e) {
                console.error(e);
            } finally {
                this.isLoading = false;
            }
        },

        get filteredList() {
            return this.list.filter(i => {
                const s = this.search.toLowerCase();
                const matchSearch = (i.nama || '').toLowerCase().includes(s) || 
                                  (i.judul_acara || '').toLowerCase().includes(s) || 
                                  (i.nama_ruangan || '').toLowerCase().includes(s);
                const matchStatus = this.filterStatus === '' || i.status === this.filterStatus;
                return matchSearch && matchStatus;
            });
        },

        formatDate(val) {

    if (!val) return '-';

    const arr =
        Array.isArray(val)
        ? val
        : [val];

    return arr.map(d => {

        const dt =
            new Date(d);

        return dt.toLocaleDateString(
            'id-ID',
            {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            }
        );

    }).join(', ');
},

        statusColor(status) {

    const colors = {

        'Request':
            'bg-amber-50 text-amber-700 border border-amber-200',

        'Booking':
            'bg-blue-50 text-blue-700 border border-blue-200',

        'Sedang Di Pinjam':
            'bg-indigo-600 text-white shadow-lg shadow-indigo-200',

        'Selesai':
            'bg-emerald-50 text-emerald-700 border border-emerald-200',

        'Cancel':
            'bg-rose-50 text-rose-700 border border-rose-200'
    };

    return colors[status]
        || 'bg-slate-100 text-slate-700';
},

        async openConfirm(id, status) {
            const pass = prompt('Konfirmasi Admin (Password):');
            if (pass !== this.adminPass) return alert('Akses Ditolak');
            await this.updateStatus(id, status);
        },

        async updateStatus(id, status, extra = {}) {
            const { error } = await _sb
                .from('peminjaman_ruangan')
                .update({ status, ...extra })
                .eq('id', id);
            
            if (error) alert('Gagal memperbarui status');
            this.fetchData();
        },

        openUpload(id) {
            const input = document.getElementById('cameraInput');
            input.value = '';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                this.isLoading = true;
                const fileName = `bukti_${id}_${Date.now()}.jpg`;

                const { error: upErr } = await _sb.storage
                    .from('bukti-foto')
                    .upload(fileName, file);

                if (upErr) {
                    alert('Gagal upload gambar');
                    this.isLoading = false;
                    return;
                }

                const { data } = _sb.storage.from('bukti-foto').getPublicUrl(fileName);

                await this.updateStatus(id, 'Sedang Di Pinjam', { foto_url: data.publicUrl });
                alert('Ruangan berhasil di-aktifkan!');
            };
            input.click();
        },

        async deleteData(id) {
            const pass = prompt('Password Admin untuk menghapus:');
            if (pass !== this.adminPass) return alert('Password Salah');
            
            if (confirm('Data akan dihapus permanen. Lanjutkan?')) {
                await _sb.from('peminjaman_ruangan').delete().eq('id', id);
                this.fetchData();
            }
        }
    }
}
</script>

</body>
</html>
