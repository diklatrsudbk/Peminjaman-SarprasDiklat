<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Peminjaman Ruangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 p-4 md:p-6" x-data="roomList()" x-init="fetchData()">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <a href="index.html" class="text-blue-600 font-bold flex items-center gap-2">
                <i class="fa fa-arrow-left"></i> Menu Utama
            </a>
            <h2 class="text-2xl font-bold text-gray-800">Data Peminjaman Ruangan</h2>
            <a href="input_ruangan.html" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-blue-700 transition-all">
                <i class="fa fa-plus mr-2"></i> Tambah Data
            </a>
        </div>

        <!-- Tabel -->
        <div class="w-full overflow-x-auto bg-white rounded-2xl shadow-sm border border-gray-200">
            <table class="w-full text-left border-collapse min-w-[900px]">
                <thead class="bg-gray-100 text-gray-600 uppercase text-[11px] font-bold">
                    <tr>
                        <th class="p-4 text-center w-16">No</th>
                        <th class="p-4">Acara & Ruangan</th>
                        <th class="p-4">Tanggal & Waktu</th>
                        <th class="p-4">Peminjam</th>
                        <th class="p-4">WhatsApp</th>
                        <th class="p-4 text-center">Status</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <template x-for="(item, i) in list" :key="item.id">
                        <tr class="border-b hover:bg-gray-50 transition-colors">
                            <td class="p-4 text-center font-mono text-gray-400" x-text="i+1"></td>
                            <td class="p-4">
                                <div class="font-bold text-gray-800" x-text="item.judul_acara"></div>
                                <div class="text-[10px] text-blue-600 font-bold uppercase tracking-tighter" x-text="item.nama_ruangan"></div>
                            </td>
                            <td class="p-4">
                                <div class="text-xs text-gray-700" x-text="item.tanggal ? item.tanggal.join(', ') : '-'"></div>
                                <div class="text-[10px] text-gray-500 italic" x-text="item.jam_mulai + ' - ' + item.jam_selesai"></div>
                            </td>
                            <td class="p-4">
                                <div class="font-semibold" x-text="item.nama"></div>
                                <div class="text-[10px] text-gray-500" x-text="item.identitas + ' (' + item.jurusan_divisi + ')'"></div>
                            </td>
                            <td class="p-4 font-mono text-xs" x-text="item.no_telepon || '-'"></td>
                            <td class="p-4 text-center">
                                <span :class="colors[item.status]" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-sm" x-text="item.status"></span>
                            </td>
                            <td class="p-4 text-center">
                                <div class="flex justify-center items-center gap-2">
                                    <!-- Logika Tombol Sesuai Status -->
                                    <template x-if="item.status === 'Request'">
                                        <div class="flex gap-1">
                                            <button @click="openModal('pass', item.id, 'Booking')" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-green-700">APPROVE</button>
                                            <button @click="openModal('pass', item.id, 'Cancel')" class="bg-red-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-red-600">REJECT</button>
                                        </div>
                                    </template>

                                    <template x-if="item.status === 'Booking'">
                                        <div class="flex gap-1">
                                            <button @click="openModal('upload', item.id)" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-blue-700">
                                                <i class="fa fa-camera mr-1"></i> FOTO
                                            </button>
                                            <button @click="updateStatus(item.id, 'Cancel')" class="bg-gray-400 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-gray-500">CANCEL</button>
                                        </div>
                                    </template>

                                    <template x-if="item.status === 'Sedang Di Pinjam'">
                                        <button @click="updateStatus(item.id, 'Selesai')" class="bg-teal-600 text-white px-4 py-1.5 rounded-lg text-[10px] font-bold hover:bg-teal-700">KONFIRMASI SELESAI</button>
                                    </template>

                                    <!-- Foto & Hapus Selalu Tersedia jika ada link foto atau ingin hapus -->
                                    <div class="flex items-center gap-2">
                                        <template x-if="item.foto_url">
                                            <a :href="item.foto_url" target="_blank" class="bg-gray-100 text-blue-600 p-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                                <i class="fa fa-image"></i>
                                            </a>
                                        </template>
                                        <button @click="openModal('delete', item.id)" class="bg-red-50 text-red-600 p-2 rounded-lg hover:bg-red-600 hover:text-white transition-all shadow-sm">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL -->
    <div x-show="modal" x-cloak class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-800" x-text="modalType === 'upload' ? 'Upload Bukti Foto' : 'Konfirmasi Admin'"></h3>
                <button @click="modal = false" class="text-gray-400 text-2xl">&times;</button>
            </div>

            <template x-if="modalType === 'pass' || modalType === 'delete'">
                <div>
                    <p class="text-xs text-gray-500 mb-2 text-center" x-text="modalType === 'delete' ? 'Masukkan password untuk menghapus data' : 'Masukkan password untuk approval'"></p>
                    <input type="password" x-model="password" class="w-full border-2 border-gray-100 p-3 rounded-xl mb-4 outline-none focus:border-blue-500 text-center text-lg" placeholder="******">
                    <button @click="confirmPass()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg" x-text="modalType === 'delete' ? 'HAPUS DATA' : 'KONFIRMASI'"></button>
                </div>
            </template>

            <template x-if="modalType === 'upload'">
                <div class="text-center">
                    <div x-show="!isUploading">
                        <label class="cursor-pointer group">
                            <div class="border-4 border-dashed border-gray-100 rounded-2xl p-10 group-hover:border-blue-200">
                                <i class="fa fa-cloud-upload-alt text-4xl text-gray-300 mb-2 group-hover:text-blue-400"></i>
                                <p class="text-xs text-gray-500">Ambil Foto Bukti</p>
                            </div>
                            <input type="file" capture="environment" accept="image/*" @change="uploadPhoto" class="hidden">
                        </label>
                    </div>
                    <div x-show="isUploading" class="py-10">
                        <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-2"></div>
                        <p class="text-sm font-bold text-blue-600">Mengupload...</p>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script>
        const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        function roomList() {
            return {
                list: [],
                modal: false,
                modalType: '',
                activeId: null,
                nextStatus: '',
                password: '',
                isUploading: false,
                colors: {
                    'Request': 'bg-yellow-100 text-yellow-700',
                    'Booking': 'bg-blue-600 text-white',
                    'Sedang Di Pinjam': 'bg-purple-600 text-white',
                    'Selesai': 'bg-green-600 text-white',
                    'Cancel': 'bg-red-600 text-white'
                },
                async fetchData() {
                    const { data, error } = await _sb.from('peminjaman_ruangan').select('*').order('id', {ascending: false});
                    if(!error) this.list = data;
                },
                openModal(type, id, status = '') {
                    this.modal = true; 
                    this.modalType = type;
                    this.activeId = id; 
                    this.nextStatus = status;
                    this.password = '';
                },
                async confirmPass() {
    if (this.password === '123456') {
        if (this.modalType === 'delete') {
            // 1. Ambil info data dulu untuk mendapatkan nama file fotonya
            const { data: item } = await _sb.from('peminjaman_ruangan').select('foto_url').eq('id', this.activeId).single();
            
            // 2. Jika ada foto, hapus file fisiknya dari Storage
            if (item && item.foto_url) {
                // Ambil nama file dari URL (mengambil bagian setelah /bukti-foto/)
                const fileName = item.foto_url.split('/').pop();
                await _sb.storage.from('bukti-foto').remove([fileName]);
            }

            // 3. Baru hapus data dari tabel database
            const { error } = await _sb.from('peminjaman_ruangan').delete().eq('id', this.activeId);
            
            if(!error) alert('Data dan Foto berhasil dihapus!');
        } else {
            // Logika untuk Approve/Reject tetap sama
            await this.updateStatus(this.activeId, this.nextStatus);
            alert('Berhasil diupdate!');
        }
        this.modal = false;
        this.fetchData();
    } else { 
        alert('Password Admin Salah!'); 
    }
},
                async updateStatus(id, status, extra = {}) {
                    await _sb.from('peminjaman_ruangan').update({ status, ...extra }).eq('id', id);
                    this.fetchData();
                },
                async uploadPhoto(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    this.isUploading = true;
                    try {
                        const name = `bukti_${this.activeId}_${Date.now()}.jpg`;
                        const { error: uploadError } = await _sb.storage.from('bukti-foto').upload(name, file);
                        if (uploadError) throw uploadError;

                        const { data: { publicUrl } } = _sb.storage.from('bukti-foto').getPublicUrl(name);
                        await this.updateStatus(this.activeId, 'Sedang Di Pinjam', { foto_url: publicUrl });
                        this.modal = false;
                        alert('Foto terunggah!');
                    } catch (error) {
                        alert('Gagal: ' + error.message);
                    } finally {
                        this.isUploading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
