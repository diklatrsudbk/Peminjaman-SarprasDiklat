<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Management Ruangan | Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Custom Warna Ungu Sesuai Referensi Gambar */
        .bg-custom-purple { background-color: #5850ec; }
        .text-custom-purple { color: #5850ec; }
        .border-custom-purple { border-color: #5850ec; }
    </style>
</head>

<body class="bg-[#f8faff] min-h-screen p-4 md:p-6 antialiased text-slate-700" x-data="roomList()">

<div class="max-w-[1400px] mx-auto" x-cloak>

    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6">
        
        <div class="flex items-center gap-4">
            <div class="bg-custom-purple w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-100">
                <i class="fa fa-door-open text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-[#1e293b]">Management Ruangan</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                    DIKLAT • RSUD BANDUNG KIWARI
                </p>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
            <a href="input_ruangan.html" class="bg-custom-purple hover:bg-indigo-700 text-white px-6 h-11 rounded-full text-[11px] font-black flex items-center gap-2 uppercase tracking-wider transition-all shadow-sm">
                <i class="fa fa-plus-circle"></i> Input Baru
            </a>

            <div class="relative flex-1 md:w-64">
                <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" x-model="search" placeholder="Cari nama / ruangan..." 
                    class="w-full pl-10 pr-4 h-11 rounded-2xl border border-slate-100 bg-white text-sm font-medium outline-none focus:ring-2 ring-indigo-50 shadow-sm">
            </div>

            <select x-model="filterStatus" class="h-11 px-4 rounded-2xl border border-slate-100 bg-white text-sm font-bold text-slate-600 shadow-sm outline-none">
                <option value="">Semua Status</option>
                <option value="Request">Request</option>
                <option value="Approved">Approved</option>
                <option value="Booking">Booking</option>
                <option value="Sedang Di Pinjam">Sedang Di Pinjam</option>
                <option value="Overdue">Overdue</option>
                <option value="Bukti Terkirim">Bukti Terkirim</option>
                <option value="Selesai">Selesai</option>
                <option value="Cancel">Cancel</option>
            </select>

            <button @click="fetchData()" :disabled="isLoading" class="w-11 h-11 rounded-2xl border border-slate-100 bg-white flex items-center justify-center text-custom-purple hover:bg-slate-50 shadow-sm transition-all disabled:opacity-50">
                <i class="fa fa-sync-alt text-sm" :class="isLoading ? 'animate-spin' : ''"></i>
            </button>
        </div>
    </div>

    <div class="flex gap-4 mb-8 overflow-x-auto pb-2 custom-scroll">
        <div class="bg-white border border-slate-50 shadow-sm px-5 py-3 rounded-2xl min-w-[140px] flex items-center justify-between gap-4">
            <div>
                <div class="text-[10px] uppercase font-bold tracking-wider text-slate-400">Total Request</div>
                <div class="text-xl font-black text-amber-500 mt-0.5" x-text="list.filter(i => i.status === 'Request').length"></div>
            </div>
            <div class="w-8 h-8 rounded-xl bg-amber-50 flex items-center justify-center text-amber-500 text-xs"><i class="fa fa-clock"></i></div>
        </div>
        <div class="bg-white border border-slate-50 shadow-sm px-5 py-3 rounded-2xl min-w-[140px] flex items-center justify-between gap-4">
            <div>
                <div class="text-[10px] uppercase font-bold tracking-wider text-slate-400">Aktif Dipinjam</div>
                <div class="text-xl font-black text-custom-purple mt-0.5" x-text="list.filter(i => i.status === 'Sedang Di Pinjam').length"></div>
            </div>
            <div class="w-8 h-8 rounded-xl bg-indigo-50 flex items-center justify-center text-custom-purple text-xs"><i class="fa fa-door-open"></i></div>
        </div>
    </div>

    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden mb-12">
        
        <div x-show="isLoading" class="p-20 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-custom-purple border-t-transparent mb-4"></div>
            <p class="text-slate-400 font-medium text-sm">Memuat data dari server...</p>
        </div>

        <div x-show="!isLoading" class="overflow-x-auto custom-scroll">
            <table class="w-full text-left min-w-[1000px]">
                <thead class="bg-[#fcfdff] border-b border-slate-50">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="py-5 px-8">Peminjam</th>
                        <th class="py-5 px-4 text-center">Status</th>
                        <th class="py-5 px-4">Acara & Ruangan</th>
                        <th class="py-5 px-4">Waktu Penggunaan</th>
                        <th class="py-5 px-8 text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50 text-sm">
                    <template x-for="item in filteredList" :key="item.id">
                        <tr class="hover:bg-[#fcfdff] transition-all group">
                            
                            <td class="py-5 px-8">
                                <div class="flex items-center gap-3">
                                    <div class="w-9 h-9 rounded-full bg-indigo-50 text-custom-purple flex items-center justify-center text-xs font-black" 
                                         x-text="(item.nama || 'U').charAt(0).toUpperCase()"></div>
                                    <div>
                                        <div class="font-bold text-slate-800 text-sm" x-text="item.nama"></div>
                                        <div class="text-[11px] text-slate-400 font-medium mt-0.5" x-text="item.identitas + ' • ' + item.jurusan_divisi"></div>
                                        <a :href="'https://wa.me/' + item.no_telepon" target="_blank" class="inline-flex items-center gap-1 mt-1 text-emerald-600 font-bold text-[11px] hover:underline">
                                            <i class="fab fa-whatsapp"></i> <span x-text="item.no_telepon"></span>
                                        </a>
                                    </div>
                                </div>
                            </td>

                            <td class="py-5 px-4 text-center">
                                <span :class="statusColor(item.status)" 
                                    class="inline-block px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider" 
                                    x-text="item.status">
                                </span>
                            </td>

                            <td class="py-5 px-4">
                                <div class="font-bold text-slate-700 leading-tight" x-text="item.judul_acara"></div>
                                <div class="mt-1.5 flex flex-wrap gap-1">
                                    <span class="px-2.5 py-0.5 rounded-full bg-indigo-50 text-custom-purple text-[10px] font-black border border-indigo-100/50">
                                        <i class="fa fa-location-dot mr-1"></i><span x-text="item.nama_ruangan"></span>
                                    </span>
                                </div>
                            </td>

                            <td class="py-5 px-4">
                                <div class="text-xs font-bold text-slate-700">
                                    <i class="fa fa-calendar-day mr-1 text-slate-300"></i>
                                    <span x-text="formatDate(item.tanggal)"></span>
                                </div>
                                <div class="text-[11px] font-semibold text-slate-400 mt-1 flex items-center gap-1">
                                    <i class="fa fa-clock text-slate-300"></i>
                                    <span x-text="item.jam_mulai + ' - ' + item.jam_selesai"></span>
                                </div>
                            </td>

                            <td class="py-5 px-8 text-right">
                                <div x-data="{ openMenu: false }" class="relative inline-block text-left">
                                    <button @click="openMenu = !openMenu" class="w-9 h-9 rounded-2xl border border-slate-100 flex items-center justify-center hover:bg-slate-50 transition-all relative">
                                        <i class="fa fa-ellipsis-v text-slate-400 text-xs"></i>
                                        <span class="absolute top-1 right-1 w-2 h-2 rounded-full border-2 border-white" 
                                              :class="item.status === 'Selesai' ? 'bg-green-400' : 'bg-orange-400'"></span>
                                    </button>

                                    <div x-show="openMenu" @click.away="openMenu = false" x-transition 
                                        class="absolute right-0 mt-2 w-52 bg-white rounded-2xl shadow-2xl border border-slate-50 z-50 p-1.5">
                                        
                                        <template x-if="item.status === 'Request'">
                                            <button @click="openConfirm(item.id, 'Booking'); openMenu=false" class="w-full text-left flex items-center gap-2.5 px-4 py-2 rounded-xl hover:bg-green-50 text-green-700 text-xs font-bold">
                                                <i class="fa fa-check-circle"></i> Setujui Booking
                                            </button>
                                        </template>

                                        <template x-if="item.status === 'Booking'">
                                            <button @click="openUpload(item.id); openMenu=false" class="w-full text-left flex items-center gap-2.5 px-4 py-2 rounded-xl hover:bg-blue-50 text-blue-700 text-xs font-bold">
                                                <i class="fa fa-camera"></i> Ambil Ruangan
                                            </button>
                                        </template>

                                        <template x-if="item.status === 'Sedang Di Pinjam'">
                                            <button @click="updateStatus(item.id, 'Selesai'); openMenu=false" class="w-full text-left flex items-center gap-2.5 px-4 py-2 rounded-xl hover:bg-emerald-50 text-emerald-700 text-xs font-bold">
                                                <i class="fa fa-flag-checkered"></i> Selesai
                                            </button>
                                        </template>

                                        <template x-if="item.foto_url">
                                            <a :href="item.foto_url" target="_blank" class="w-full text-left flex items-center gap-2.5 px-4 py-2 rounded-xl hover:bg-sky-50 text-sky-700 text-xs font-bold block">
                                                <i class="fa fa-image"></i> Lihat Bukti
                                            </a>
                                        </template>

                                        <div class="h-[1px] bg-slate-50 my-1"></div>

                                        <button @click="deleteData(item.id); openMenu=false" class="w-full text-left flex items-center gap-2.5 px-4 py-2 rounded-xl hover:bg-red-50 text-red-600 text-xs font-bold">
                                            <i class="fa fa-trash"></i> Hapus Data
                                        </button>
                                    </div>
                                </div>
                            </td>

                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div x-show="!isLoading && filteredList.length === 0" class="p-20 text-center">
            <div class="w-20 h-20 rounded-full bg-slate-50 flex items-center justify-center mx-auto mb-4 border border-slate-100">
                <i class="fa fa-folder-open text-3xl text-slate-300"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-700 mb-1">Data Tidak Ditemukan</h3>
            <p class="text-sm text-slate-400">Coba ubah kata kunci pencarian atau ganti filter status Anda.</p>
        </div>

    </div>
</div>

<input type="file" accept="image/*" capture="environment" id="cameraInput" class="hidden" />

<script>
const SB_URL = "https://gyiucoognxykakksrulo.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU";
const _sb = supabase.createClient(SB_URL, SB_KEY);

function roomList() {
    return {
        list: [],
        search: '',
        filterStatus: '',
        isLoading: true,
        adminPass: atob("MTIzNDU2"), // 123456

        async init() {
            await this.fetchData();
        },

        async fetchData() {
            this.isLoading = true;
            try {
                const { data, error } = await _sb
                    .from('peminjaman_ruangan')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;
                this.list = data || [];
            } catch (e) {
                console.error(e);
            } finally {
                this.isLoading = false;
            }
        },

        get filteredList() {
            return this.list.filter(i => {
                const s = this.search.toLowerCase();
                const matchSearch = (i.nama || '').toLowerCase().includes(s) || 
                                  (i.judul_acara || '').toLowerCase().includes(s) || 
                                  (i.nama_ruangan || '').toLowerCase().includes(s);
                const matchStatus = this.filterStatus === '' || i.status === this.filterStatus;
                return matchSearch && matchStatus;
            });
        },

        formatDate(val) {
            if (!val) return '-';
            const arr = Array.isArray(val) ? val : [val];
            return arr.map(d => {
                const dt = new Date(d);
                return dt.toLocaleDateString('id-ID', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric'
                });
            }).join(', ');
        },

        statusColor(status) {
            const colors = {
                'Request': 'bg-amber-50 text-amber-600 border border-amber-100',
                'Booking': 'bg-blue-50 text-blue-600 border border-blue-100',
                'Sedang Di Pinjam': 'bg-indigo-50 text-[#5850ec] border border-indigo-100', // Disamakan dengan visual "BUKTI TERKIRIM"
                'Selesai': 'bg-emerald-50 text-emerald-600 border border-emerald-100',
                'Cancel': 'bg-rose-50 text-rose-600 border border-rose-100'
            };
            return colors[status] || 'bg-slate-100 text-slate-600';
        },

        async openConfirm(id, status) {
            const pass = prompt('Konfirmasi Admin (Password):');
            if (pass !== this.adminPass) return alert('Akses Ditolak');
            await this.updateStatus(id, status);
        },

        async updateStatus(id, status, extra = {}) {
            const { error } = await _sb
                .from('peminjaman_ruangan')
                .update({ status, ...extra })
                .eq('id', id);
            
            if (error) alert('Gagal memperbarui status');
            this.fetchData();
        },

        openUpload(id) {
            const input = document.getElementById('cameraInput');
            input.value = '';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                this.isLoading = true;
                const fileName = `bukti_${id}_${Date.now()}.jpg`;

                const { error: upErr } = await _sb.storage
                    .from('bukti-foto')
                    .upload(fileName, file);

                if (upErr) {
                    alert('Gagal upload gambar');
                    this.isLoading = false;
                    return;
                }

                const { data } = _sb.storage.from('bukti-foto').getPublicUrl(fileName);

                await this.updateStatus(id, 'Sedang Di Pinjam', { foto_url: data.publicUrl });
                alert('Ruangan berhasil di-aktifkan!');
            };
            input.click();
        },

        async deleteData(id) {
            const pass = prompt('Password Admin untuk menghapus:');
            if (pass !== this.adminPass) return alert('Password Salah');
            
            if (confirm('Data akan dihapus permanen. Lanjutkan?')) {
                await _sb.from('peminjaman_ruangan').delete().eq('id', id);
                this.fetchData();
            }
        }
    }
}
</script>

</body>
</html>
